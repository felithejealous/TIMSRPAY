<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Staff Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #fcd34d;
            --primary-dark: #f59e0b;
            --dark: #111111;
            --light: #f9fafb;
            --text-muted: #6b7280;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #f9fafb 0%, #fcd34d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .logo-area { margin-bottom: 2rem; }
        .logo-area img { 
            max-height: 90px; 
            width: auto; 
            margin-bottom: 1rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* FORM STYLES */
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
            padding-left: 5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
            background: #f8fafc;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(252, 211, 77, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1.1rem;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            color: var(--dark);
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 700;
        }

        /* REAL-TIME CLOCK FOR CONTEXT */
        .portal-clock {
            position: fixed;
            bottom: 20px;
            right: 30px;
            text-align: right;
            color: rgba(0,0,0,0.5);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <img src="logo.png" alt="Teo D' Mango Logo">
        </div>

        <div class="login-header">
            <h1>Staff Portal</h1>
            <p>Please enter your credentials to manage your shift and orders.</p>
        </div>

        <form>
            <div class="form-group">
                <label>Employee ID / Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Enter your ID or Email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="button" class="btn-login" onclick="location.href='overview.html'">
                Login to Dashboard <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="footer-links">
            <p>Forgot password? <a href="#">Contact Manager</a></p>
        </div>
    </div>

    <div class="portal-clock">
        <div id="time">00:00:00 PM</div>
        <div id="date" style="font-size: 0.8rem;">Sunday, December 28</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString([], { hour12: true, hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
