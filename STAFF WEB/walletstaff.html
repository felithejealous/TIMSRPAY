<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPAY Members | Teo D' Mango Staff</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --mango: #ffc244;
            --mango-dark: #d4a017;
            --strawberry: #ff4d6d;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;

            --bg-main: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --card-bg: rgba(30, 30, 30, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --sidebar-bg: rgba(10, 10, 10, 0.95);
            --shadow: 0 15px 40px rgba(0,0,0,0.5);
            --hover-bg: rgba(255, 255, 255, 0.06);
            --icon-bg: rgba(255, 255, 255, 0.05);
            --glow-opacity: 0.15;
            --input-bg: rgba(0,0,0,0.3);
        }

        body.light-mode {
            --bg-main: #f4f5f7;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(0, 0, 0, 0.05);
            --sidebar-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --hover-bg: rgba(255, 255, 255, 1);
            --icon-bg: rgba(0, 0, 0, 0.03);
            --glow-opacity: 0.3;
            --input-bg: #ffffff;
        }
          html.preload-light body {
    --bg-main: #f4f5f7;
    --text-main: #1a1a1a;
    --text-muted: #666666;
    --card-bg: rgba(255, 255, 255, 0.7);
    --card-border: rgba(0, 0, 0, 0.05);
    --sidebar-bg: rgba(255, 255, 255, 0.9);
    --shadow: 0 10px 30px rgba(0,0,0,0.05);
    --hover-bg: rgba(255, 255, 255, 1);
    --icon-bg: rgba(0, 0, 0, 0.03);
    --glow-opacity: 0.3;
    --input-bg: rgba(0, 0, 0, 0.03);
}

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-main); color: var(--text-main);
            display: flex; min-height: 100vh; transition: 0.4s ease;
            position: relative; overflow-x: hidden;
        }

        body::before, body::after { content: ''; position: fixed; border-radius: 50%; z-index: -1; pointer-events: none; transition: 0.5s ease; }
        body::before { top: -10%; left: -5%; width: 500px; height: 500px; background: var(--mango); filter: blur(120px); opacity: var(--glow-opacity); }
        body::after { bottom: -10%; right: -5%; width: 400px; height: 400px; background: var(--strawberry); filter: blur(150px); opacity: calc(var(--glow-opacity) - 0.05); }

        aside {
            width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed;
            border-right: 1px solid var(--card-border); padding: 2rem 1.2rem; display: flex;
            flex-direction: column; z-index: 1000; backdrop-filter: blur(20px); transition: all 0.4s ease;
        }
        .sidebar-logo { padding: 10px 5px; margin-bottom: 2rem; text-align: center; }
        .sidebar-logo img { max-width: 100%; height: auto; max-height: 50px; display: block; margin: 0 auto; filter: drop-shadow(0 0 5px var(--mango)); }

        nav { flex: 1; display: flex; flex-direction: column; }
        nav ul { list-style: none; display: flex; flex-direction: column; height: 100%; }
        nav a {
            text-decoration: none; color: var(--text-muted); padding: 1rem 1.2rem;
            display: flex; align-items: center; gap: 15px; font-weight: 700; font-size: 13px;
            border-radius: 14px; margin-bottom: 0.5rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        nav a:hover { color: var(--text-main); background: var(--icon-bg); transform: translateX(5px); }
        nav li.active a { background: var(--mango); color: #111; box-shadow: 0 8px 20px rgba(245, 158, 11, 0.2); transform: translateX(0); }
        nav a i { font-size: 16px; width: 20px; text-align: center; }

        main { margin-left: 260px; flex: 1; padding: 2.5rem 3.5rem; transition: all 0.4s ease; width: calc(100% - 260px); }

        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; gap: 1.5rem; flex-wrap: wrap; }
        .header-title h1 { font-size: clamp(2rem, 4vw, 2.5rem); font-weight: 900; letter-spacing: -1px; line-height: 1; margin-bottom: 5px; color: var(--text-main);}
        .header-title p { color: var(--text-muted); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;}

        .header-actions { display: flex; align-items: center; gap: 20px; flex: 1; justify-content: flex-end; }
        .search-wrapper { position: relative; width: 100%; max-width: 480px; }
        .search-wrapper input {
            width: 100%; padding: 12px 20px 12px 50px; border-radius: 50px; background: var(--card-bg);
            border: 1px solid var(--card-border); color: var(--text-main); font-size: 13px; font-weight: 600;
            outline: none; transition: 0.3s; backdrop-filter: blur(20px);
        }
        .search-wrapper input:focus { border-color: var(--mango); box-shadow: 0 0 0 4px rgba(255, 194, 68, 0.1); }
        .search-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .theme-btn { background: var(--icon-bg); border: 1px solid var(--card-border); color: var(--text-main); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
        .theme-btn:hover { background: var(--mango); color: #111; transform: rotate(15deg); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
            padding: 1.5rem; border-radius: 24px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 1rem;
        }
        .icon-circle {
            width: 50px; height: 50px; border-radius: 16px; display: grid; place-items: center;
            font-size: 1.2rem; background: var(--icon-bg); color: var(--mango);
        }

        .card {
            background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
            border-radius: 30px; padding: 2rem; box-shadow: var(--shadow);
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.5rem;
        }

        .wallet-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(20px);
        }
        .wallet-card:hover {
            transform: translateY(-6px);
            border-color: var(--mango);
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        .staff-avatar {
            width: 62px; height: 62px; border-radius: 50%;
            border: 3px solid var(--mango);
            object-fit: cover;
            background: rgba(255,255,255,0.05);
        }

        .wallet-badge {
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .wallet-badge-active {
            background: rgba(16,185,129,0.12);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.2);
        }

        .wallet-badge-inactive {
            background: rgba(239,68,68,0.12);
            color: var(--danger);
            border: 1px solid rgba(239,68,68,0.2);
        }

        .wallet-code-chip {
            font-family: monospace;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--mango);
            background: rgba(255, 194, 68, 0.08);
            border: 1px solid rgba(255, 194, 68, 0.15);
            border-radius: 12px;
            padding: 8px 12px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 1rem;
            font-style: italic;
        }

        @media (max-width: 1100px) {
            aside { width: 90px; padding: 2rem 0.5rem; }
            aside span, .sidebar-logo img { display: none; }
            nav a { justify-content: center; }
            main { margin-left: 90px; width: calc(100% - 90px); padding: 2rem; }
        }
    </style>
    <script>
(function () {
    const savedTheme = localStorage.getItem("staff-theme");
    if (savedTheme === "light") {
        document.documentElement.classList.add("preload-light");
    } else {
        document.documentElement.classList.remove("preload-light");
    }
})();
</script>
</head>
<body>

    <aside>
        <div class="sidebar-logo"><img src="logo.png" alt="Teo D' Mango"></div>
        <nav>
            <ul>
                <li><a href="overview.html"><i class="fa-solid fa-chart-line"></i> <span>Overview</span></a></li>
                <li><a href="orderstaffs.html"><i class="fa-solid fa-bell-concierge"></i> <span>Orders</span></a></li>
                <li><a href="menustaff.html"><i class="fa-solid fa-receipt"></i> <span>Menu</span></a></li>
                <li><a href="inventory.html"><i class="fa-solid fa-boxes-stacked"></i> <span>Inventory</span></a></li>
                <li><a href="dashboardstaff.html"><i class="fa-solid fa-user-clock"></i> <span>Attendance</span></a></li>
                <li class="active"><a href="walletstaff.html"><i class="fa-solid fa-credit-card"></i> <span>RPAY</span></a></li>
                <li><a href="rewardsstaff.html"><i class="fa-solid fa-gift"></i> <span>Rewards</span></a></li>
                <li><a href="dashaccsettstaff.html"><i class="fa-solid fa-gear"></i> <span>Settings</span></a></li>
                <li style="margin-top: auto;"><a href="index.html" style="color: var(--danger);" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <div class="header-title">
                <h1>RPAY Member List</h1>
                <p>Select a wallet owner before processing a top-up.</p>
            </div>

            <div class="header-actions">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="walletSearchInput" placeholder="Search by full name, email, or wallet code...">
                </div>
                <button class="theme-btn" id="themeToggle"><i class="fa-solid fa-sun"></i></button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="icon-circle"><i class="fa-solid fa-users"></i></div>
                <div>
                    <h4 style="font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px;">Wallet Results</h4>
                    <div id="walletCount" style="font-size: 22px; font-weight: 900;">0</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="icon-circle" style="color: var(--success);"><i class="fa-solid fa-wallet"></i></div>
                <div>
                    <h4 style="font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px;">Visible Balance</h4>
                    <div id="visibleBalance" style="font-size: 22px; font-weight: 900;">₱0.00</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="icon-circle" style="color: var(--mango);"><i class="fa-solid fa-user-check"></i></div>
                <div>
                    <h4 style="font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px;">Active Wallet Users</h4>
                    <div id="activeWalletUsers" style="font-size: 22px; font-weight: 900;">0</div>
                </div>
            </div>
        </section>

        <section class="card">
            <div id="walletGrid" class="wallet-grid">
                <div class="empty-state" style="grid-column: 1 / -1;">
                    Search for a customer wallet to begin.
                </div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/logoutstaff.js"></script>
    <script src="js/themesync.js"></script>
    <script src="js/walletstaff.js"></script>
</body>
</html>
