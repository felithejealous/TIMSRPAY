<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | Teo D' Mango Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --mango: #ffc244;
            --mango-dark: #d4a017;
            --bg: #ffffff;
            --text: #1a1a1a;
            --surface: #f4f5f7;
            --border: rgba(0,0,0,0.06);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
            --danger: #ff4d6d;
            --success: #198754;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .brand-wall {
            background: linear-gradient(135deg, #111 0%, #050505 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10%;
            position: relative;
            overflow: hidden;
        }

        .brand-wall::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--mango) 0%, transparent 60%);
            opacity: 0.15;
            filter: blur(60px);
        }

        .brand-logo {
            width: 140px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)) drop-shadow(0 0 10px var(--mango-dark));
            animation: slideIn 0.8s var(--ease);
        }

        .brand-wall h1 {
            font-size: clamp(40px, 5vw, 70px);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -2px;
            margin-bottom: 20px;
            animation: slideIn 1s var(--ease);
        }

        .brand-wall .accent {
            color: var(--mango);
        }

        .brand-wall p {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
            opacity: 0.7;
            max-width: 400px;
            animation: slideIn 1.2s var(--ease);
        }

        .form-area {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10%;
            position: relative;
            background: var(--bg);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.8s var(--ease);
        }

        .auth-container h2 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .auth-container .sub-friendly {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
            font-weight: 600;
        }

        .field {
            margin-bottom: 20px;
            position: relative;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            color: #888;
            font-size: 16px;
        }

        .field input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: var(--mango);
            background: var(--bg);
            box-shadow: 0 0 0 4px rgba(255, 194, 68, 0.1);
        }

        .field input::placeholder {
            color: #aaa;
            font-weight: 500;
        }

        .btn-friendly {
            width: 100%;
            padding: 20px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-friendly:hover {
            transform: translateY(-3px);
            background: var(--mango);
            color: #111;
            box-shadow: 0 15px 30px rgba(255, 194, 68, 0.3);
        }

        .btn-friendly:active {
            transform: scale(0.98);
        }

        .btn-friendly:disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .options {
            margin-top: 30px;
            text-align: center;
        }

        .options a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            transition: 0.3s;
        }

        .options a:hover {
            color: var(--text);
        }

        .login-message {
            min-height: 22px;
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
        }

        .login-message.error {
            color: var(--danger);
        }

        .login-message.success {
            color: var(--success);
        }

        .portal-clock {
            position: absolute;
            bottom: 30px;
            right: 40px;
            text-align: right;
            color: #888;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .portal-clock #time {
            font-size: 24px;
            color: var(--text);
            letter-spacing: -1px;
            margin-bottom: 2px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-30px);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
        }

        @media (max-width: 1000px) {
            body {
                grid-template-columns: 1fr;
            }

            .brand-wall {
                display: none;
            }
        }
    </style>
    <script>
(function () {
    const savedTheme = localStorage.getItem("staff-theme");
    if (savedTheme === "light") {
        document.documentElement.classList.add("preload-light");
    } else {
        document.documentElement.classList.remove("preload-light");
    }
})();
</script>
</head>
<body>

    <section class="brand-wall">
        <img src="logo.png" class="brand-logo" alt="Teo D Mango Logo">
        <h1>INTERNAL<br><span class="accent">SYSTEMS.</span></h1>
        <p>Authorized personnel only. Secure access to inventory, order management, and attendance tracking.</p>
        <div style="margin-top: auto; font-weight: 900; opacity: 0.05; font-size: 40px; letter-spacing: 2px;">STAFF PORTAL</div>
    </section>

    <section class="form-area">
        <div class="auth-container">
            <h2>Authentication</h2>
            <p class="sub-friendly">Enter your assigned credentials to proceed.</p>

            <form id="staffLoginForm">
                <div class="field">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="email" id="empId" placeholder="Enter staff email" required>
                    </div>
                </div>

                <div class="field">
                    <label>Security Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="empPass" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-friendly" id="loginBtn">
                    Verify & Enter <i class="fa-solid fa-arrow-right"></i>
                </button>

                <div id="loginMessage" class="login-message"></div>

                <div class="options">
                    <a href="#">Need help? Contact IT Support.</a>
                </div>
            </form>
        </div>

        <div class="portal-clock">
            <div id="time">00:00 PM</div>
            <div id="date">Sun, Mar 01, 2026</div>
        </div>
    </section>

    <script src="config.js"></script>
    <script src="js/loginstaff.js"></script>
</body>
</html>
