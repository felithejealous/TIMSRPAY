<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin-login.css">
</head>


<body>

    <div class="login-container">
    <form class="login-card" id="loginForm">
        <div class="login-logo">
            <img src="../images/TeoDMangoLogo.png" alt="Teo D' Mango">
        </div>
        
        <h2>Admin Login</h2>
        <p>Enter your credentials to access the admin.</p>

        <div class="input-group">
            <fieldset>
                <input type="text" id="username" placeholder=" " required>
                <legend>Username</legend>
            </fieldset>
        </div>

        <div class="input-group">
            <fieldset>
                <input type="password" id="password" placeholder=" " required>
                <legend>Password</legend>
            </fieldset>
        </div>

        <button type="submit" class="login-btn">Log In</button>
        
        <div class="login-footer">
            <a href="#">Forgot password?</a>
        </div>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevents the page from refreshing

        // Get values (you can add validation here later)
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if(user && pass) {
            // Success! Redirect to the dashboard
            // Note: Ensure this path is correct relative to your login file
            window.location.href = "../html/A-Dashboard.html";
        } else {
            alert("Please enter both username and password.");
        }
    });
</script>

    
</body>
</html>
