<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teo D' Mango | Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap');

        :root {
            --primary: #FFD93D;
            --primary-dark: #e7c097;
            --dark: #1A120B;
            --glass-bg: rgb(255, 255, 255);
            --glass-border: rgba(255, 255, 255, 0);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #FFD93D 0%, #ffffff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glass Header */
        header {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            width: 100%;
        }
        .nav-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-img { height: 50px; }
        nav a { text-decoration: none; color: var(--dark); margin-left: 25px; font-size: 13px; font-weight: 800; text-transform: uppercase; }

        /* Auth Container with Glass Effect */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container { 
            max-width: 1000px; 
            width: 100%;
            display: flex; 
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px; 
            overflow: hidden; 
            border: 1px solid var(--glass-border); 
            box-shadow: var(--shadow);
            min-height: 600px;
        }

        .form-side { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .image-side { 
            flex: 1.2; 
            background: url('https://images.unsplash.com/photo-1591073113125-e46713c829ed?auto=format&fit=crop&q=80&w=1200') center/cover; 
            position: relative;
        }
        .image-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(255,217,61,0.2), transparent);
        }
        
        .tabs { margin-bottom: 35px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 100px; display: inline-flex; }
        .tab-btn { 
            padding: 10px 30px; border: none; cursor: pointer; font-weight: 800; 
            background: transparent; border-radius: 100px; font-size: 14px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--dark); color: white; }
        
        h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -1.5px; }
        .desc { color: rgba(0,0,0,0.6); margin-bottom: 30px; font-weight: 600; }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; color: var(--dark); letter-spacing: 1px; }
        input { 
            width: 100%; padding: 14px 18px; border: 2px solid rgba(0,0,0,0.05); 
            border-radius: 16px; background: rgba(255,255,255,0.5); outline: none; transition: 0.3s;
            font-size: 1rem; font-weight: 600;
        }
        input:focus { border-color: var(--dark); background: white; }
        .toggle-btn { position: absolute; right: 18px; top: 40px; cursor: pointer; font-size: 11px; font-weight: 900; color: var(--dark); }
        
        .btn-submit { 
            width: 100%; padding: 16px; background: var(--dark); color: #fff; 
            border: none; border-radius: 16px; font-weight: 800; cursor: pointer; 
            margin-top: 15px; font-size: 1rem; transition: 0.3s;
        }
        .btn-submit:hover { transform: scale(1.02); background: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .forgot { display: block; text-align: right; font-size: 13px; margin-top: -10px; margin-bottom: 20px; color: var(--dark); font-weight: 700; text-decoration: none; }
        
        /* Social Options */
        .social-area { display: none; margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 25px; }
        .social-area.show { display: block; }
        .social-btn { 
            width: 100%; padding: 12px; border: 2px solid var(--glass-border); border-radius: 16px; 
            background: var(--glass-bg); cursor: pointer; margin-bottom: 12px; font-weight: 800; 
            display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 14px; 
        }
        .social-btn:hover { background: white; }

        @media (max-width: 850px) {
            .auth-container { flex-direction: column; margin: 0; border-radius: 30px; }
            .image-side { height: 200px; order: -1; }
            .form-side { padding: 40px 25px; }
            h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container"> 
            <a href="index.html">
                <img src="logo.png" alt="Teo D' Mango" class="logo-img">
            </a>
            <nav>
                <a href="index.html">Home</a>
                <a href="#">Stores</a>
            </nav>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="form-side">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('login', this)">Log In</button>
                    <button class="tab-btn" onclick="switchTab('signup', this)">Sign Up</button>
                </div>
                
                <h2 id="title">Welcome Back</h2>
                <p id="desc" class="desc">Please enter your details to continue.</p>
                
                <form id="authForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="example@teodmango.com" required>
                    </div>
                    <div class="form-group">
                        <label id="passLabel">Password</label>
                        <input type="password" id="pass" placeholder="••••••••" required>
                        <span class="toggle-btn" onclick="toggleView()">SHOW</span>
                    </div>
                    <a href="#" class="forgot" id="forgotLink">Forgot Password?</a>
                    <button type="submit" class="btn-submit" onclick="handleAuth()">Continue</button>
                </form>

                <div id="social-area" class="social-area">
                    <div style="text-align:center; font-size:11px; font-weight:900; color:var(--dark); margin-bottom:20px; opacity: 0.5;">OR JOIN WITH</div>
                <button class="social-btn" type="button" onclick="window.location.href='http://127.0.0.1:8000/auth/google/login'">
                        <img src="https://www.google.com/favicon.ico" width="18"> Google Account
                        <i class="fa-solid fa-mobile-screen-button"></i> Mobile SMS
                    </button>
                </div>
            </div>
            <div class="image-side"></div>
        </div>
    </div>

    <script>
   
        function toggleView() {
            const input = document.getElementById('pass');
            const btn = document.querySelector('.toggle-btn');
            if(input.type === 'password') {
                input.type = 'text'; btn.innerText = 'HIDE';
            } else {
                input.type = 'password'; btn.innerText = 'SHOW';
            }
        }

        function switchTab(type, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            const title = document.getElementById('title');
            const desc = document.getElementById('desc');
            const social = document.getElementById('social-area');
            const forgot = document.getElementById('forgotLink');

            if(type === 'signup') {
                title.innerText = 'Create Account';
                desc.innerText = 'Join the tribe and start earning rewards.';
                social.classList.add('show');
                forgot.style.display = 'none';
            } else {
                title.innerText = 'Welcome Back';
                desc.innerText = 'Please enter your details to continue.';
                social.classList.remove('show');
                forgot.style.display = 'block';
            }
        }

        function handleAuth() {
            // Mock authentication logic
            alert("Redirecting to your Tropical Dashboard...");
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
