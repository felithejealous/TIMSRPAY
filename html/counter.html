<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango - Counter</title>
    <link rel="stylesheet" href="../css/counter.css">
</head>
<body>

    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>

    <div class="content-wrapper">
        <div class="glass-panel">
            <div class="input-section">
                <h1 class="minimal-title">Input your number</h1>
                <div class="display-container" id="display">____</div>
            </div>

            <div class="numpad-grid">
                <button class="num-btn" onclick="addNum('1')">1</button>
                <button class="num-btn" onclick="addNum('2')">2</button>
                <button class="num-btn" onclick="addNum('3')">3</button>
                <button class="num-btn" onclick="addNum('4')">4</button>
                <button class="num-btn" onclick="addNum('5')">5</button>
                <button class="num-btn" onclick="addNum('6')">6</button>
                <button class="num-btn" onclick="addNum('7')">7</button>
                <button class="num-btn" onclick="addNum('8')">8</button>
                <button class="num-btn" onclick="addNum('9')">9</button>
                <button class="num-btn util" onclick="clearNum()">C</button>
                <button class="num-btn" onclick="addNum('0')">0</button>
                <button class="num-btn util" onclick="backspace()">⌫</button>
            </div>
        </div>

        <button class="minimal-footer-btn" id="confirmBtn">Confirm</button>
    </div>

    <script>
        let inputString = "";
        const display = document.getElementById('display');
        const confirmBtn = document.getElementById('confirmBtn');

        function updateDisplay() {
            let dots = inputString.padEnd(4, "_");
            display.innerText = dots;
            confirmBtn.classList.toggle('active', inputString.length > 0);
        }

        function addNum(num) {
            if (inputString.length < 4) {
                inputString += num;
                updateDisplay();
            }
        }

        function clearNum() {
            inputString = "";
            updateDisplay();
        }

        function backspace() {
            inputString = inputString.slice(0, -1);
            updateDisplay();
        }

        confirmBtn.addEventListener('click', () => {
            if (inputString.length > 0) {
                localStorage.setItem('userNumber', inputString);
                window.location.href = '../html/receipt.html';
            }
        });
    </script>
</body>
</html>
