<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Admin Analytics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --mango-yellow: #fcdb05;
            --mango-orange: #ff8c00;
            --mango-dark: #0f0c08; 
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.08);
            --mesh-color-1: rgba(252, 219, 5, 0.05);
            --mesh-color-2: rgba(252, 219, 5, 0.02);
            --logo-filter: brightness(0) invert(1);
            --sidebar-width: 240px;
            --modal-overlay: rgba(0,0,0,0.92);
            --modal-card: #14110e;
        }

        /* --- LIGHT THEME OVERRIDES --- */
        body.light-theme {
            --mango-dark: #f8f9fa; 
            --text-main: #1c1917;  
            --text-sub: #57534e;   
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --mesh-color-1: rgba(252, 219, 5, 0.15);
            --mesh-color-2: rgba(255, 140, 0, 0.1);
            --logo-filter: none;
            --modal-card: #ffffff;
            --modal-overlay: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        .nav-item, .chart-card, .theme-toggle-circle { transition: all 0.2s ease; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mango-dark);
            background-image: 
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, var(--mesh-color-2) 0px, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex; min-height: 100vh; overflow: hidden;
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--glass-bg); backdrop-filter: blur(25px);
            height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 100;
        }
        .logo-section { padding: 40px 20px; text-align: center; }
        .logo-section img { width: 120px; filter: var(--logo-filter); }
        .nav-menu { flex: 1; padding: 10px 15px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 18px; margin-bottom: 6px;
            border-radius: 12px; color: var(--text-sub); text-decoration: none; font-weight: 500; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: var(--mango-yellow); color: #120f0a !important; font-weight: 700; box-shadow: 0 4px 15px rgba(252, 219, 5, 0.2); }
        
        .logout-btn {
            padding: 12px 18px; margin: 15px; border-radius: 12px;
            color: #ef4444; font-weight: 700; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem;
        }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        
        /* Unified Header Sizing */
        .header-card { padding: 25px 40px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .theme-toggle-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--mango-yellow); color: #120f0a; border: none; }

        /* --- DASHBOARD ELEMENTS --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .chart-card { padding: 25px; border-radius: 32px; position: relative; cursor: pointer; border: 1px solid var(--glass-border); background: var(--glass-bg); }
        .chart-card:hover { transform: translateY(-5px); border-color: var(--mango-orange); }
        
        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: var(--modal-overlay); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(20px); opacity: 0; transition: opacity 0.4s ease; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { width: 90%; max-width: 950px; height: 85vh; padding: 40px; border-radius: 30px; position: relative; background: var(--modal-card); box-shadow: 0 25px 60px rgba(0,0,0,0.2); transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal.show .modal-content { transform: scale(1); }
        
        .select-filter { padding: 10px 15px; border-radius: 12px; border: 1px solid var(--glass-border); background: #1a1a1a; color: var(--mango-yellow); outline: none; cursor: pointer; font-size: 0.85rem; font-weight: 700; }
        body.light-theme .select-filter { background: #fff; color: #1c1917; border-color: #e5e7eb; }
    </style>
    
    <script>
        /* --- IMMEDIATE THEME CHECK --- */
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') document.documentElement.classList.add('light-theme-applied');
        })();
    </script>
</head>
<body>
    <script>
        /* --- BODY THEME APPLICATION --- */
        if (document.documentElement.classList.contains('light-theme-applied')) document.body.classList.add('light-theme');
    </script>

    <aside class="sidebar glass">
        <div class="logo-section"><img src="../images/logo.png" alt="Logo"></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
            <a href="accounts.html" class="nav-item"><i class="fa-solid fa-user-gear"></i> Accounts</a>
            <a href="inventory.html" class="nav-item"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            <a href="menuman.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Menu Manager</a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-tags"></i> Promos</a>
            <a href="rewards.html" class="nav-item"><i class="fa-solid fa-gift"></i> Rewards</a>
            <a href="announce.html" class="nav-item"><i class="fa-solid fa-bell"></i> Announce</a>
            <a href="payments.html" class="nav-item"><i class="fa-solid fa-credit-card"></i> Payments</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-cog"></i> Settings</a>
        </nav>
        <a href="index.html" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
    </aside>

    <main class="main-content">
        <header class="header-card glass">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter" style="color: var(--mango-yellow);">Teo Analytics</h1>
                <p class="text-xs font-mono opacity-60" id="currentDate"></p>
            </div>
            <button class="theme-toggle-circle" onclick="toggleTheme()">
                <i class="fa-solid fa-sun" id="themeIcon"></i>
            </button>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-3xl flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-yellow-400 text-black flex items-center justify-center"><i class="fas fa-coins"></i></div>
                <div><h4 class="text-xs opacity-50 uppercase font-bold">Total Revenue</h4><p id="statRevenue" class="text-2xl font-black tracking-tight">₱0</p></div>
            </div>
            <div class="glass p-6 rounded-3xl flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-yellow-400 text-black flex items-center justify-center"><i class="fas fa-gift"></i></div>
                <div><h4 class="text-xs opacity-50 uppercase font-bold">Rewards Issued</h4><p id="statRewards" class="text-2xl font-black tracking-tight">0 pts</p></div>
            </div>
            <div class="glass p-6 rounded-3xl flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-yellow-400 text-black flex items-center justify-center"><i class="fas fa-boxes"></i></div>
                <div><h4 class="text-xs opacity-50 uppercase font-bold">Stock Health</h4><p id="statStock" class="text-2xl font-black tracking-tight">--</p></div>
            </div>
        </section>

        <div class="flex justify-between items-center mb-8 px-2">
            <h2 class="text-sm font-black uppercase tracking-widest opacity-60">System Insights</h2>
            <div class="flex gap-4">
                <select class="select-filter" id="timeframeFilter" onchange="initDashboard()">
                    <option value="daily">Daily Pulse</option>
                    <option value="weekly">Weekly Overview</option>
                    <option value="monthly">Monthly Growth</option>
                </select>
                <button class="bg-white text-black px-5 py-2 rounded-xl text-sm font-bold shadow-sm hover:scale-105 transition" onclick="exportData()">Export CSV</button>
            </div>
        </div>

        <section class="dashboard-grid">
            <div class="chart-card glass" onclick="openModal('salesChart', 'Sales Volume')">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-4">Sales Count</h3>
                <div class="h-[200px]"><canvas id="salesChart"></canvas></div>
            </div>
            <div class="chart-card glass" onclick="openModal('revenueChart', 'Gross Revenue')">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-4">Total Revenue</h3>
                <div class="h-[200px]"><canvas id="revenueChart"></canvas></div>
            </div>
            <div class="chart-card glass" onclick="openModal('inventoryChart', 'Inventory Status')">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-4">Stock Levels</h3>
                <div class="h-[200px]"><canvas id="inventoryChart"></canvas></div>
            </div>
            <div class="chart-card glass" onclick="openModal('bestSellersChart', 'Item Popularity')">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-4">Best Sellers</h3>
                <div class="h-[200px]"><canvas id="bestSellersChart"></canvas></div>
            </div>
            <div class="chart-card glass" onclick="openModal('paymentChart', 'Payment Breakdown')">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-4">Payments</h3>
                <div class="h-[200px]"><canvas id="paymentChart"></canvas></div>
            </div>
            <div class="chart-card glass" onclick="openModal('rewardsChart', 'Loyalty Points')">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-4">Rewards Issued</h3>
                <div class="h-[200px]"><canvas id="rewardsChart"></canvas></div>
            </div>
        </section>
    </main>

    <div class="modal" id="chartModal">
        <div class="modal-content glass">
            <span class="absolute top-8 right-10 text-4xl cursor-pointer opacity-40 hover:opacity-100" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" class="text-2xl font-black uppercase text-yellow-500 mb-8 tracking-widest"></h3>
            <div class="w-full h-[85%]"><canvas id="modalCanvas"></canvas></div>
        </div>
    </div>

    <script>
        /* --- GLOBAL CONFIG --- */
        const API_BASE_URL = 'https://api.yourdomain.com/v1';
        let state = { analyticsData: null, charts: {}, modalChartInstance: null };

        /* --- THEME LOGIC --- */
        function updateThemeUI() {
            const isLight = document.body.classList.contains('light-theme');
            const icon = document.getElementById('themeIcon');
            icon.className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            if (state.analyticsData) renderAllCharts();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            updateThemeUI();
        }

        /* --- DASHBOARD INITIALIZATION --- */
        async function initDashboard() {
            document.getElementById('currentDate').innerText = new Date().toDateString();
            const timeframe = document.getElementById('timeframeFilter').value;
            try {
                const response = await fetch(`${API_BASE_URL}/analytics?timeframe=${timeframe}`);
                if (response.ok) {
                    state.analyticsData = await response.json();
                    updateSummaryWidgets();
                    renderAllCharts();
                }
            } catch (err) { console.warn("Waiting for API backend integration..."); }
        }

        function updateSummaryWidgets() {
            if (!state.analyticsData) return;
            const data = state.analyticsData;
            // Example reduction logic for backend data
            const totalRev = data.revenue.data.reduce((a, b) => a + b, 0);
            document.getElementById('statRevenue').innerText = `₱${totalRev.toLocaleString()}`;
        }

        /* --- CHART RENDER ENGINE --- */
        function renderAllCharts() {
            if (!state.analyticsData) return;
            const isLight = document.body.classList.contains('light-theme');
            const accent = isLight ? '#ff8c00' : '#fcdb05';
            const data = state.analyticsData;

            // Simplified mapping for ready-to-use backend data
            renderChart('salesChart', 'line', data.sales.labels, data.sales.data, accent, 'Orders', true);
            renderChart('revenueChart', 'bar', data.revenue.labels, data.revenue.data, '#52c41a', 'Revenue', false);
            renderChart('inventoryChart', 'bar', data.inventory.labels, data.inventory.data, '#ef4444', 'Stock Level', false);
            renderChart('bestSellersChart', 'bar', data.bestSellers.labels, data.bestSellers.data, accent, 'Units', false);
            renderChart('paymentChart', 'doughnut', data.paymentBreakdown.labels, data.paymentBreakdown.data, [accent, '#1890ff', '#ef4444'], 'Payments');
            renderChart('rewardsChart', 'line', data.rewards.labels, data.rewards.data, '#a855f7', 'Points', true);
        }

        function renderChart(id, type, labels, data, color, labelName, isGradient) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (state.charts[id]) state.charts[id].destroy();

            const isLight = document.body.classList.contains('light-theme');
            const textColor = isLight ? '#1c1917' : '#d1d5db';
            const gridColor = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.03)';

            state.charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{ 
                        label: labelName, 
                        data: data, 
                        backgroundColor: Array.isArray(color) ? color : color + '33', 
                        borderColor: Array.isArray(color) ? 'transparent' : color, 
                        borderWidth: 2.5, 
                        tension: 0.4, 
                        fill: isGradient 
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type === 'doughnut', labels: { color: textColor } } },
                    scales: { 
                        y: { display: type !== 'doughnut', grid: { color: gridColor }, ticks: { color: textColor }, beginAtZero: true },
                        x: { display: type !== 'doughnut', grid: { display: false }, ticks: { color: textColor } }
                    }
                }
            });
        }

        /* --- MODAL LOGIC --- */
        function openModal(chartId, title) {
            if (!state.charts[chartId]) return;
            const modal = document.getElementById('chartModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
            document.getElementById('modalTitle').innerText = title;
            
            const source = state.charts[chartId];
            const ctx = document.getElementById('modalCanvas').getContext('2d');
            if (state.modalChartInstance) state.modalChartInstance.destroy();

            state.modalChartInstance = new Chart(ctx, {
                type: source.config.type,
                data: JSON.parse(JSON.stringify(source.config.data)),
                options: { ...source.config.options, maintainAspectRatio: false, plugins: { legend: { display: true } } }
            });
        }

        function closeModal() {
            const modal = document.getElementById('chartModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 400);
        }

        /* --- EXPORT --- */
        function exportData() {
            // CSV Export Logic here
        }

        window.onload = () => {
            updateThemeUI();
            initDashboard();
        };

        window.onclick = (e) => { if (e.target.classList.contains('modal')) closeModal(); }
    </script>
</body>
</html>
