<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --mango-yellow: #fcdb05;
            --mango-dark: #120f0a; 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--mango-dark);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Transition Overlay */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--mango-dark);
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        .page-transition.fade-out {
            opacity: 0;
        }

        /* Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(252, 219, 5, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(252, 219, 5, 0.04) 0%, transparent 40%);
            z-index: -1;
        }

        /* Glass Card */
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* Modern Input Styling */
        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1rem 1rem 1rem 3rem;
            color: white;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--mango-yellow);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(252, 219, 5, 0.1);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }

        .login-btn {
            width: 100%;
            background: var(--mango-yellow);
            color: var(--mango-dark);
            font-weight: 800;
            padding: 1rem;
            border-radius: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(252, 219, 5, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(252, 219, 5, 0.3);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="page-transition" id="transitionOverlay"></div>
    <div class="mesh-bg"></div>

    <form class="login-card" id="loginForm">
        <div class="text-center mb-8">
            <img src="../images/logo.png" alt="Teo D' Mango" class="h-16 mx-auto mb-4 filter brightness-0 invert">
            <h2 class="text-3xl font-extrabold text-white">System Login</h2>
            <p class="text-gray-400 mt-2">Secure access to Admin Portal</p>
        </div>
        
        <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">
            Log In
        </button>
        
        <div class="text-center mt-6">
            <a href="#" class="text-sm text-yellow-400 hover:text-yellow-300 font-semibold">Forgot password?</a>
        </div>
    </form>

    <script>
        // Fade in on load
        window.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('transitionOverlay');
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 100);
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const overlay = document.getElementById('transitionOverlay');
            overlay.classList.remove('fade-out');
            
            // Redirect after fade
            setTimeout(() => {
                window.location.href = "../html/dashboard.html";
            }, 500);
        });
    </script>
</body>
</html>
