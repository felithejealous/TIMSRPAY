<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Rewards Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --mango-yellow: #fcdb05;
            --mango-orange: #ff8c00;
            --mango-dark: #0f0c08; 
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.08);
            --mesh-color-1: rgba(252, 219, 5, 0.05);
            --mesh-color-2: rgba(252, 219, 5, 0.02);
            --logo-filter: brightness(0) invert(1);
            --sidebar-width: 240px;
            --modal-overlay: rgba(0,0,0,0.92);
            --modal-card: #14110e;
        }

        /* --- UNIFIED LIGHT THEME --- */
        body.light-theme {
            --mango-dark: #f8f9fa; 
            --text-main: #1a1a1a;  
            --text-sub: #4a4a4a;   
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --mesh-color-1: rgba(252, 219, 5, 0.15);
            --mesh-color-2: rgba(255, 140, 0, 0.05);
            --logo-filter: none;
            --modal-card: #ffffff;
            --modal-overlay: rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s, border 0.3s, transform 0.2s; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mango-dark);
            background-image: 
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, var(--mesh-color-2) 0px, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex; min-height: 100vh; overflow: hidden;
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width); background: var(--glass-bg); backdrop-filter: blur(25px);
            height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 100;
        }
        .logo-section { padding: 40px 20px; text-align: center; }
        .logo-section img { width: 120px; filter: var(--logo-filter); }
        .nav-menu { flex: 1; padding: 10px 15px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 18px; margin-bottom: 6px;
            border-radius: 12px; color: var(--text-sub); text-decoration: none; font-weight: 500; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: var(--mango-yellow); color: #120f0a !important; font-weight: 700; box-shadow: 0 4px 15px rgba(252, 219, 5, 0.2); }
        .logout-btn { padding: 12px 18px; margin: 15px; border-radius: 12px; color: #ef4444; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem; }

        /* --- CONTENT AREA --- */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        .header-card { padding: 25px 40px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--mango-yellow); color: #120f0a; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- STATS GRID --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 20px; border-radius: 24px; display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .icon-issued { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .icon-redeemed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .icon-balance { background: rgba(252, 219, 5, 0.1); color: var(--mango-yellow); }

        /* --- CONTENT CONTAINER --- */
        .content-container { background: var(--glass-bg); border-radius: 28px; border: 1px solid var(--glass-border); padding: 30px; }
        .search-container { position: relative; flex: 1; max-width: 400px; }
        .search-container input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 16px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; }
        body.light-theme .search-container input { background: #f1f3f5; color: #1a1a1a; }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .btn-main { background: var(--mango-yellow); color: #000; padding: 12px 24px; border-radius: 16px; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        /* --- TABLE --- */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 15px; font-size: 0.7rem; text-transform: uppercase; color: var(--mango-yellow); border-bottom: 1px solid var(--glass-border); letter-spacing: 1px; }
        .data-table td { padding: 15px; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; }

        .points-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
        .badge-issued { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .badge-redeemed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: var(--modal-overlay); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(15px); padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--modal-card); width: 100%; max-width: 500px; padding: 40px; border-radius: 32px; border: 1px solid var(--glass-border); position: relative; }
        
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--mango-orange); margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; margin-bottom: 15px; }
        body.light-theme .form-group input, body.light-theme .form-group select { background: #f1f3f5; color: #000; border: 1px solid #dee2e6; }
    </style>

    <script>
        /* --- THEME SYNC --- */
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') document.documentElement.classList.add('light-theme-applied');
        })();
    </script>
</head>
<body>
    <script>
        if (document.documentElement.classList.contains('light-theme-applied')) document.body.classList.add('light-theme');
    </script>

    <aside class="sidebar glass">
        <div class="logo-section"><img src="../images/logo.png" alt="Logo"></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
            <a href="accounts.html" class="nav-item"><i class="fa-solid fa-user-gear"></i> Accounts</a>
            <a href="inventory.html" class="nav-item"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            <a href="menuman.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Menu Manager</a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-tags"></i> Promos</a>
            <a href="rewards.html" class="nav-item active"><i class="fa-solid fa-gift"></i> Rewards</a>
            <a href="announce.html" class="nav-item"><i class="fa-solid fa-bell"></i> Announce</a>
            <a href="payments.html" class="nav-item"><i class="fa-solid fa-credit-card"></i> Payments</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-cog"></i> Settings</a>
        </nav>
        <a href="index.html" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
    </aside>

    <main class="main-content">
        <header class="header-card glass">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter" style="color: var(--mango-yellow);">Loyalty Rewards</h1>
                <p class="text-xs font-mono opacity-60">Customer Points & Redemption Ledger</p>
            </div>
            <button class="theme-toggle-circle" onclick="toggleTheme()">
                <i class="fa-solid fa-sun" id="themeIcon"></i>
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-icon icon-issued"><i class="fas fa-arrow-down"></i></div>
                <div><p class="text-[10px] uppercase font-bold opacity-40">Total Issued</p><h4 id="statIssued" class="text-xl font-black">0 pts</h4></div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon icon-redeemed"><i class="fas fa-arrow-up"></i></div>
                <div><p class="text-[10px] uppercase font-bold opacity-40">Total Redeemed</p><h4 id="statRedeemed" class="text-xl font-black">0 pts</h4></div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon icon-balance"><i class="fas fa-wallet"></i></div>
                <div><p class="text-[10px] uppercase font-bold opacity-40">Current Balance</p><h4 id="statBalance" class="text-xl font-black">0 pts</h4></div>
            </div>
        </div>

        <div class="content-container glass">
            <div class="flex justify-between items-center mb-8 gap-4">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search customer or card..." onkeyup="handleSearch()">
                </div>
                <button class="btn-main hover:scale-105" onclick="openModal()">
                    <i class="fas fa-plus mr-2"></i> Register Record
                </button>
            </div>

            <table class="data-table" id="rewardsTable">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Card ID</th>
                        <th>Timestamp</th>
                        <th>Status</th>
                        <th>Points</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="rewardModal">
        <div class="modal-content glass">
            <h2 class="text-xl font-black uppercase text-yellow-400 mb-8" id="modalTitle">Reward Entry</h2>
            <form id="rewardForm">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="custName" required>
                </div>
                <div class="form-group">
                    <label>Card Identifier</label>
                    <input type="text" id="cardNumber" placeholder="TDM-XXXX" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group">
                        <label>Transaction Date</label>
                        <input type="date" id="custDate" required>
                    </div>
                    <div class="form-group">
                        <label>Action Type</label>
                        <select id="custType">
                            <option value="Issued">Issued (+)</option>
                            <option value="Redeemed">Redeemed (-)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Point Volume</label>
                    <input type="number" id="custPoints" required>
                </div>
                <div class="flex justify-between mt-10">
                    <button type="button" class="btn-main bg-white/5 text-white/40 uppercase text-[10px] font-bold" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-main">Commit Record</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.yourdomain.com/v1';
        let records = [];

        /* --- THEME --- */
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        }

        /* --- UI LOGIC --- */
        const modal = document.getElementById('rewardModal');
        const rewardForm = document.getElementById('rewardForm');

        function openModal() {
            rewardForm.reset();
            document.getElementById('modalTitle').innerText = "Register Record";
            document.getElementById('custDate').valueAsDate = new Date();
            modal.classList.add('show');
        }

        function closeModal() { modal.classList.remove('show'); }

        function handleSearch() {
            const filter = document.getElementById("searchInput").value.toUpperCase();
            renderTable(records.filter(r => 
                r.customer.toUpperCase().includes(filter) || 
                r.cardId.toUpperCase().includes(filter)
            ));
        }

        /* --- BACKEND READY ACTIONS --- */
        async function initApp() {
            try {
                const res = await fetch(`${API_BASE_URL}/rewards`);
                if(res.ok) {
                    records = await res.json();
                    renderTable(records);
                }
            } catch(e) { console.warn("Waiting for API connection..."); }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            data.forEach(r => {
                const isIssued = r.status === 'Issued';
                body.innerHTML += `
                    <tr>
                        <td class="font-bold">${r.customer}</td>
                        <td class="font-mono text-xs opacity-60">${r.cardId}</td>
                        <td class="text-xs">${r.date}</td>
                        <td><span class="points-badge ${isIssued ? 'badge-issued' : 'badge-redeemed'}">${r.status}</span></td>
                        <td class="font-black ${isIssued ? 'text-green-500' : 'text-red-500'}">${isIssued ? '+' : '-'}${r.points}</td>
                        <td style="text-align: right;">
                            <button class="text-yellow-400 mr-3" onclick="handleEdit('${r.id}')"><i class="fas fa-edit"></i></button>
                            <button class="text-red-500/50 hover:text-red-500" onclick="handleDelete('${r.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            updateStats(data);
        }

        function updateStats(data) {
            const issued = data.filter(r => r.status === 'Issued').reduce((sum, r) => sum + parseInt(r.points), 0);
            const redeemed = data.filter(r => r.status === 'Redeemed').reduce((sum, r) => sum + parseInt(r.points), 0);
            document.getElementById('statIssued').innerText = issued.toLocaleString() + ' pts';
            document.getElementById('statRedeemed').innerText = redeemed.toLocaleString() + ' pts';
            document.getElementById('statBalance').innerText = (issued - redeemed).toLocaleString() + ' pts';
        }

        rewardForm.addEventListener('submit', function(e) {
            e.preventDefault();
            // Logic for POST/PUT request to backend
            console.log("Committing reward record...");
            closeModal();
        });

        window.onload = () => {
            initApp();
            // Sync theme UI
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('themeIcon').className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        };

        window.onclick = (e) => { if (e.target == modal) closeModal(); }
    </script>
</body>
</html>
