<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Admin Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="ADMIN2\css\aside.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            /* Yellow Mango Palette */
            --mango-yellow: #fcdb05;
            --mango-dark: #120f0a; /* Dark background */
            --text-light: #ececec; 
            
            /* Enhanced Glass Effect for Dark Mode */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--mango-dark);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; /* FORCED NO SCROLL */
            height: 100vh;
            margin: 0;
        }

        /* Transition Overlay */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--mango-dark);
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        .page-transition.fade-out {
            opacity: 0;
        }

        /* Subtle Dark Mesh Background with Yellow Hue */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(252, 219, 5, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(252, 219, 5, 0.04) 0%, transparent 40%);
            z-index: -1;
        }

        /* Stronger Glassmorphism for Dark Mode */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .btn-launch {
            background: var(--mango-yellow);
            color: var(--mango-dark);
            padding: 1rem 2.5rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(252, 219, 5, 0.2);
            transition: all 0.3s ease;
        }

        .btn-launch:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(252, 219, 5, 0.3);
            filter: brightness(1.1);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(252, 219, 5, 0.2);
        }
    </style>
</head>
<body class="antialiased flex flex-col justify-between">
    <div class="page-transition" id="transitionOverlay"></div>
    <div class="mesh-bg"></div>

    <nav class="w-full px-8 py-4 flex justify-end items-center z-50">
        <div class="text-[9px] font-bold text-yellow-500 tracking-widest uppercase hidden sm:block bg-black/30 px-5 py-2 rounded-full border border-yellow-500/20 backdrop-blur-md">
            Secure Terminal
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="glass-card p-12 md:p-16 max-w-3xl w-full text-center flex flex-col items-center">
            
            <img src="../images/logo.png" alt="Teo D' Mango Logo" class="h-20 mb-8 filter brightness-0 invert">
            
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-6 glow-text leading-[0.9] text-white">
                Admin <span class="text-yellow-400 italic font-light">Portal</span>
            </h1>

            <p class="text-gray-300 text-lg mb-12 max-w-md leading-relaxed font-medium">
                Welcome back to the centralized control system. Proceed to log in to access harvest logistics and sales analytics.
            </p>

            <div>
                <a href="login.html" class="btn-launch inline-flex items-center gap-3 group transition-link">
                    Enter Secure Portal
                    <i class="fas fa-lock text-xs group-hover:scale-110 transition-transform"></i>
                </a>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 flex-none">
        <p class="text-[9px] font-bold uppercase tracking-[0.5em] text-gray-600">
            Enterprise Gateway &copy; 2026 Teo D' Mango
        </p>
    </footer>

    <script>
        // Fade in on load
        window.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('transitionOverlay');
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 100);
        });

        // Fade out on click
        document.querySelector('.transition-link').addEventListener('click', function(e) {
            e.preventDefault();
            const href = this.getAttribute('href');
            const overlay = document.getElementById('transitionOverlay');
            
            overlay.classList.remove('fade-out');
            
            setTimeout(() => {
                window.location.href = href;
            }, 500); // Matches CSS transition time
        });
    </script>
</body>
</html>
