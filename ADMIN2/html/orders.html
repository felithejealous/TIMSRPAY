<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Order Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --mango-yellow: #fcdb05; --mango-orange: #ff8c00; --mango-dark: #0f0c08; 
            --text-main: #ffffff; --text-sub: #a1a1aa; --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.08); --mesh-color-1: rgba(252, 219, 5, 0.05);
            --mesh-color-2: rgba(252, 219, 5, 0.02); --logo-filter: brightness(0) invert(1);
            --sidebar-width: 240px; --modal-card: #14110e;
            --modal-overlay: rgba(0,0,0,0.92);
        }

        /* --- LIGHT THEME OVERRIDES --- */
        body.light-theme {
            --mango-dark: #f8f9fa; --text-main: #1a1a1a; --text-sub: #4a4a4a;   
            --glass-bg: rgba(255, 255, 255, 0.8); --glass-border: rgba(0, 0, 0, 0.1);
            --mesh-color-1: rgba(252, 219, 5, 0.15); --mesh-color-2: rgba(255, 140, 0, 0.05);
            --logo-filter: none; --modal-card: #ffffff;
            --modal-overlay: rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s, border 0.3s, transform 0.2s; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mango-dark);
            background-image: radial-gradient(at 0% 0%, var(--mesh-color-1) 0px, transparent 40%), radial-gradient(at 100% 100%, var(--mesh-color-2) 0px, transparent 40%);
            background-attachment: fixed; color: var(--text-main); display: flex; min-height: 100vh; overflow: hidden;
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background: var(--glass-bg); backdrop-filter: blur(25px); height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 100; }
        .logo-section { padding: 40px 20px; text-align: center; }
        .logo-section img { width: 120px; filter: var(--logo-filter); }
        .nav-menu { flex: 1; padding: 10px 15px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 18px; margin-bottom: 6px; border-radius: 12px; color: var(--text-sub); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { background: var(--mango-yellow); color: #120f0a !important; font-weight: 700; box-shadow: 0 4px 15px rgba(252, 219, 5, 0.2); }
        .logout-btn { padding: 12px 18px; margin: 15px; border-radius: 12px; color: #ef4444; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem; }

        /* --- CONTENT --- */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        .header-card { padding: 25px 40px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--mango-yellow); color: #120f0a; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- SUMMARY CARDS --- */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 20px; border-radius: 24px; display: flex; align-items: center; gap: 15px; }
        .stat-icon { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; background: rgba(252, 219, 5, 0.1); color: var(--mango-yellow); }

        /* --- IMPROVED FILTER UI --- */
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; padding: 25px; border-radius: 28px; background: var(--glass-bg); border: 1px solid var(--glass-border); align-items: end; }
        .filter-group label { display: block; font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--mango-orange); margin-bottom: 10px; letter-spacing: 1px;}
        select, input { width: 100%; height: 30px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); padding: 14px; border-radius: 14px; font-size: 13px; outline: none; }
        body.light-theme select, body.light-theme input { background: #f1f3f5; color: #000; }
        
        .btn-export { background: #22c55e; color: #fff; padding: 14px 20px; border-radius: 14px; font-weight: 900; text-transform: uppercase; font-size: 11px; transition: 0.3s; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2); }

        /* --- DATA TABLE --- */
        .content-container { background: var(--glass-bg); border-radius: 28px; border: 1px solid var(--glass-border); padding: 25px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; color: var(--mango-yellow); border-bottom: 1px solid var(--glass-border); letter-spacing: 1px; }
        .data-table td { padding: 18px 15px; border-bottom: 1px solid var(--glass-border); font-size: 13px; }

        .badge-teopay { background: linear-gradient(45deg, #ff8c00, #fcdb05); color: #000; font-weight: 900; padding: 2px 8px; border-radius: 6px; font-size: 9px; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: var(--modal-overlay); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(15px); }
        .modal.show { display: flex; }
        .modal-card { background: var(--modal-card); width: 95%; max-width: 550px; padding: 35px; border-radius: 32px; border: 1px solid var(--glass-border); position: relative; }
        .reward-highlight { background: rgba(252, 219, 5, 0.08); border: 1px dashed var(--mango-yellow); padding: 20px; border-radius: 24px; margin-top: 20px; }
    </style>

    <script>
        /* --- IMMEDIATE THEME CHECK --- */
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') document.documentElement.classList.add('light-theme-applied');
        })();
    </script>
</head>
<body>
    <script>
        /* --- BODY THEME APPLICATION --- */
        if (document.documentElement.classList.contains('light-theme-applied')) document.body.classList.add('light-theme');
    </script>

    <aside class="sidebar glass">
        <div class="logo-section"><img src="../images/logo.png" alt="Logo"></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-item active"><i class="fa-solid fa-receipt"></i> Orders</a>
            <a href="accounts.html" class="nav-item"><i class="fa-solid fa-user-gear"></i> Accounts</a>
            <a href="inventory.html" class="nav-item"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            <a href="menuman.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Menu Manager</a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-tags"></i> Promos</a>
            <a href="rewards.html" class="nav-item"><i class="fa-solid fa-gift"></i> Rewards</a>
            <a href="announce.html" class="nav-item"><i class="fa-solid fa-bell"></i> Announce</a>
            <a href="payments.html" class="nav-item"><i class="fa-solid fa-credit-card"></i> Payments</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-cog"></i> Settings</a>
        </nav>
        <a href="index.html" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
    </aside>

    <main class="main-content">
        <header class="header-card glass">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter" style="color: var(--mango-yellow);">Order Ledger</h1>
                <p class="text-xs font-mono opacity-60">Operations & Financial Archive</p>
            </div>
            <button class="theme-toggle-circle" onclick="toggleTheme()">
                <i class="fa-solid fa-sun" id="themeIcon"></i>
            </button>
        </header>

        <div class="summary-grid">
            <div class="stat-card glass">
                <div class="stat-icon"><i class="fa-solid fa-basket-shopping"></i></div>
                <div><p class="text-[10px] uppercase font-bold opacity-40">Orders Today</p><h4 id="countToday" class="text-xl font-black">0</h4></div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon text-green-400"><i class="fa-solid fa-money-bill-trend-up"></i></div>
                <div><p class="text-[10px] uppercase font-bold opacity-40">Total Revenue</p><h4 id="revenueToday" class="text-xl font-black">₱0.00</h4></div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon text-mango-orange"><i class="fa-solid fa-wallet"></i></div>
                <div><p class="text-[10px] uppercase font-bold opacity-40">TeoPay Volume</p><h4 id="teopayToday" class="text-xl font-black">₱0.00</h4></div>
            </div>
        </div>

        <div class="filter-grid">
            <div class="filter-group">
                <label>Period</label>
                <select id="periodFilter" onchange="loadOrders()">
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Payment Mode</label>
                <select id="paymentFilter" onchange="loadOrders()">
                    <option value="all">All Modes</option>
                    <option value="TeoPay">TeoPay</option>
                    <option value="GCash">GCash</option>
                    <option value="Cash">Cash</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Service Type</label>
                <select id="serviceFilter" onchange="loadOrders()">
                    <option value="all">All Service</option>
                    <option value="Walk-in">Walk-in</option>
                    <option value="Delivery">Delivery</option>
                </select>
            </div>
            <button class="btn-export hover:scale-105" onclick="exportToExcel()">
                <i class="fa-solid fa-file-excel mr-2"></i> Export Excel
            </button>
        </div>

        <div class="content-container glass">
            <table class="data-table" id="orderTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Date & Time</th>
                        <th>Staff</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>
    </main>

    <div class="modal" id="detailsModal">
        <div class="modal-card glass">
            <h2 class="text-xl font-black uppercase text-yellow-400 mb-6">Order Manifest</h2>
            <div id="modalContent" class="space-y-4"></div>
            <div id="rewardSection"></div>
            <button class="w-full bg-yellow-400 text-black font-black p-4 rounded-2xl mt-8 uppercase text-xs tracking-widest hover:scale-[1.02]" onclick="closeModal()">Close Manifest</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.yourdomain.com/v1';
        let DATABASE = []; // Ready for fetch integration

        function updateThemeUI() {
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('themeIcon').className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            updateThemeUI();
        }

        async function initApp() {
            try {
                const response = await fetch(`${API_BASE_URL}/orders`);
                if(response.ok) {
                    DATABASE = await response.json();
                    loadOrders();
                }
            } catch(e) { console.warn("Waiting for API connection..."); }
        }

        function loadOrders() {
            const body = document.getElementById('orderTableBody');
            const paymentFilter = document.getElementById('paymentFilter').value;
            const serviceFilter = document.getElementById('serviceFilter').value;
            
            body.innerHTML = '';
            let totalRev = 0, teoVol = 0, count = 0;

            DATABASE.filter(o => 
                (paymentFilter === 'all' || o.payment === paymentFilter) && 
                (serviceFilter === 'all' || o.type === serviceFilter)
            ).forEach(order => {
                count++;
                totalRev += order.total;
                if(order.payment === 'TeoPay') teoVol += order.total;

                body.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="font-mono text-yellow-400 font-bold">${order.id}</td>
                        <td><div class="font-bold">${order.name}</div><div class="text-[10px] opacity-50 uppercase">${order.type}</div></td>
                        <td class="text-xs opacity-70">${new Date(order.date).toLocaleString()}</td>
                        <td class="text-xs">${order.staff}</td>
                        <td class="font-black">₱${order.total.toFixed(2)}</td>
                        <td><button onclick="viewDetails('${order.id}')" class="bg-white/5 border border-white/10 hover:bg-yellow-400 hover:text-black p-2 px-4 rounded-lg text-[10px] font-black uppercase transition">View</button></td>
                    </tr>`;
            });

            document.getElementById('countToday').innerText = count;
            document.getElementById('revenueToday').innerText = `₱${totalRev.toFixed(2)}`;
            document.getElementById('teopayToday').innerText = `₱${teoVol.toFixed(2)}`;
        }

        function viewDetails(id) {
            const o = DATABASE.find(order => order.id === id);
            if(!o) return;
            const content = document.getElementById('modalContent');
            const rewardSection = document.getElementById('rewardSection');

            content.innerHTML = `
                <div class="flex justify-between border-b border-white/5 pb-3"><span class="text-[10px] font-black uppercase opacity-40">Items Summary</span><span class="font-bold text-xs text-right">${o.items}</span></div>
                <div class="flex justify-between border-b border-white/5 pb-3"><span class="text-[10px] font-black uppercase opacity-40">Payment Mode</span><span class="font-bold text-xs">${o.payment === 'TeoPay' ? '<span class="badge-teopay">TeoPay</span>' : o.payment}</span></div>
                <div class="flex justify-between border-b border-white/5 pb-3"><span class="text-[10px] font-black uppercase opacity-40">Serving Staff</span><span class="font-bold text-xs">${o.staff}</span></div>
                <div class="mt-4 p-4 bg-white/5 rounded-xl text-xs italic opacity-70">"${o.feedback || 'No feedback provided.'}"</div>
            `;

            rewardSection.innerHTML = o.payment === 'TeoPay' ? `
                <div class="reward-highlight">
                    <div class="text-yellow-400 text-[10px] font-black uppercase tracking-widest mb-2"><i class="fa-solid fa-gift mr-2"></i> TeoPay Rewards</div>
                    <div class="flex justify-between text-xs"><span>Linked Card ID:</span><b class="font-mono">${o.cardId}</b></div>
                    <div class="flex justify-between text-xs mt-1"><span>Points Earned:</span><b class="text-green-400">+${o.pointsEarned} Pts</b></div>
                </div>` : '';

            document.getElementById('detailsModal').classList.add('show');
        }

        function closeModal() { document.getElementById('detailsModal').classList.remove('show'); }

        function exportToExcel() {
            if(DATABASE.length === 0) return alert("No data to export.");
            const ws = XLSX.utils.json_to_sheet(DATABASE);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Orders");
            XLSX.writeFile(wb, `TeoDMango_Ledger_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        window.onload = () => {
            updateThemeUI();
            initApp();
        };

        window.onclick = (e) => { if(e.target.classList.contains('modal')) closeModal(); }
    </script>
</body>
</html>
