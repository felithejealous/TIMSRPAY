<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Announce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --mango-yellow: #fcdb05;
            --mango-orange: #ff8c00;
            --mango-dark: #0f0c08; 
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.08);
            --mesh-color-1: rgba(252, 219, 5, 0.05);
            --mesh-color-2: rgba(252, 219, 5, 0.02);
            --logo-filter: brightness(0) invert(1);
            --sidebar-width: 240px;
            --modal-overlay: rgba(0,0,0,0.92);
            --modal-card: #14110e;
        }

        body.light-theme {
            --mango-dark: #f8f9fa; 
            --text-main: #1c1917;  
            --text-sub: #57534e;   
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --mesh-color-1: rgba(252, 219, 5, 0.15);
            --mesh-color-2: rgba(255, 140, 0, 0.1);
            --logo-filter: none;
            --modal-card: #ffffff;
            --modal-overlay: rgba(255, 255, 255, 0.85);
        }

        /* Seamless Transitions */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .nav-item, .post-card, .theme-toggle-circle, .btn-main { transition: all 0.2s ease; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mango-dark);
            background-image: 
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, var(--mesh-color-2) 0px, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex; min-height: 100vh; overflow: hidden;
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            height: 100vh; position: fixed; left: 0; top: 0;
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; z-index: 100;
        }
        .logo-section { padding: 40px 20px; text-align: center; }
        .logo-section img { width: 120px; filter: var(--logo-filter); }
        .nav-menu { flex: 1; padding: 10px 15px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 18px; margin-bottom: 6px;
            border-radius: 12px; color: var(--text-sub);
            text-decoration: none; font-weight: 500; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: var(--mango-yellow); color: #120f0a !important; font-weight: 700; box-shadow: 0 4px 15px rgba(252, 219, 5, 0.2); }

        /* Content Area */
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        .header-card { padding: 25px 40px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--mango-yellow); color: #120f0a; border: none; }

        /* Feed */
        .post-card { padding: 30px; border-radius: 28px; border: 1px solid var(--glass-border); margin-bottom: 25px; background: var(--glass-bg); }
        .pinned-post { border: 2px solid var(--mango-yellow); }
        .status-badge { font-size: 0.6rem; padding: 4px 10px; border-radius: 20px; font-weight: 900; text-transform: uppercase; }
        
        /* Modal Logic (Standardized) */
        .modal { display: none; position: fixed; inset: 0; background: var(--modal-overlay); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(20px); opacity: 0; transition: opacity 0.4s ease; }
        .modal.show { display: flex; opacity: 1; }
        .modal-content { background: var(--modal-card); width: 90%; max-width: 600px; padding: 40px; border-radius: 32px; position: relative; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal.show .modal-content { transform: scale(1); }

        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--mango-orange); margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; margin-bottom: 20px; }
        body.light-theme .form-group input, body.light-theme .form-group textarea { background: #f1f3f5; color: #000; border: 1px solid #dee2e6; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--mango-yellow); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 900; text-transform: uppercase; font-size: 10px; transition: 0.5s; z-index: 2000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>

    <script>
        // Immediate Theme Application (No Flash)
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') document.documentElement.classList.add('light-theme-applied');
        })();
    </script>
</head>
<body>
    <script>
        if (document.documentElement.classList.contains('light-theme-applied')) document.body.classList.add('light-theme');
    </script>

    <aside class="sidebar glass">
        <div class="logo-section"><img src="../images/logo.png" alt="Logo"></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
            <a href="accounts.html" class="nav-item"><i class="fa-solid fa-user-gear"></i> Accounts</a>
            <a href="inventory.html" class="nav-item"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            <a href="menuman.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Menu Manager</a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-tags"></i> Promos</a>
            <a href="rewards.html" class="nav-item"><i class="fa-solid fa-gift"></i> Rewards</a>
            <a href="announce.html" class="nav-item active"><i class="fa-solid fa-bell"></i> Announce</a>
            <a href="payments.html" class="nav-item"><i class="fa-solid fa-credit-card"></i> Payments</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-cog"></i> Settings</a>
        </nav>
        <a href="index.html" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
    </aside>

    <main class="main-content">
        <header class="header-card glass">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter" style="color: var(--mango-yellow);">Announcements</h1>
                <p class="text-xs font-mono opacity-60">Customer Broadcast Feed</p>
            </div>
            <div class="flex items-center gap-4">
                <button class="bg-yellow-400 text-black px-6 py-3 rounded-xl font-black text-xs uppercase hover:scale-105" onclick="openModal('announceModal')">
                    <i class="fas fa-plus mr-2"></i> New Post
                </button>
                <button class="theme-toggle-circle" onclick="toggleTheme()">
                    <i class="fa-solid fa-sun" id="themeIcon"></i>
                </button>
            </div>
        </header>

        <div class="max-w-3xl mx-auto space-y-6" id="feedBody">
            </div>
    </main>

    <div class="modal" id="announceModal">
        <div class="modal-content glass">
            <button class="absolute top-6 right-8 text-2xl opacity-40 hover:opacity-100" onclick="closeModal('announceModal')">&times;</button>
            <h2 class="text-xl font-black uppercase text-yellow-400 mb-8" id="modalTitle">Broadcast Message</h2>
            <form id="announceForm">
                <input type="hidden" id="postId">
                <div class="form-group"><label>Headline Title</label><input type="text" id="annTitle" required></div>
                <div class="form-group"><label>Content Body</label><textarea id="annContent" rows="4" required></textarea></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group"><label>Image URL</label><input type="text" id="annImageUrl"></div>
                    <div class="form-group"><label>Schedule</label><input type="datetime-local" id="annSchedule"></div>
                </div>
                <div class="flex justify-between items-center mt-6">
                    <button type="button" class="text-xs font-bold opacity-40 uppercase" onclick="closeModal('announceModal')">Discard</button>
                    <button type="submit" class="bg-yellow-400 text-black px-8 py-4 rounded-xl font-black uppercase text-xs">Deploy Post</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast">Action Successful!</div>

    <script>
        const API_BASE_URL = 'https://api.yourdomain.com/v1';
        let state = { posts: [] };

        function updateThemeUI() {
            const isLight = document.body.classList.contains('light-theme');
            document.getElementById('themeIcon').className = isLight ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
            updateThemeUI();
        }

        function openModal(id) {
            const m = document.getElementById(id);
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('show'), 10);
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            m.classList.remove('show');
            setTimeout(() => m.style.display = 'none', 400);
        }

        async function initApp() {
            try {
                const res = await fetch(`${API_BASE_URL}/announcements`);
                if(res.ok) {
                    state.posts = await res.json();
                    renderFeed();
                }
            } catch(e) { console.warn("API Offline. Feed empty."); }
        }

        function renderFeed() {
            const feed = document.getElementById('feedBody');
            feed.innerHTML = state.posts.length ? state.posts.map(post => `
                <div class="post-card glass ${post.isPinned ? 'pinned-post' : ''}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4 items-center">
                            <div class="w-10 h-10 rounded-xl bg-yellow-400 text-black flex items-center justify-center"><i class="fas fa-bullhorn"></i></div>
                            <div>
                                <h2 class="font-black text-lg">${post.title}</h2>
                                <p class="text-[10px] opacity-40 font-mono">${post.date} • Admin</p>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm opacity-80 leading-relaxed">${post.content}</p>
                    <div class="flex justify-end gap-4 mt-6 pt-6 border-t border-white/5">
                        <button class="text-[10px] font-black uppercase opacity-40 hover:opacity-100">Pin</button>
                        <button class="text-[10px] font-black uppercase opacity-40 hover:opacity-100">Edit</button>
                        <button class="text-[10px] font-black uppercase text-red-500">Delete</button>
                    </div>
                </div>
            `).join('') : '<p class="text-center opacity-30 py-20 uppercase text-xs tracking-widest">No active broadcasts.</p>';
        }

        window.onload = () => {
            updateThemeUI();
            initApp();
        };

        window.onclick = (e) => { if (e.target.classList.contains('modal')) closeModal(e.target.id); }
    </script>
</body>
</html>
