<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango | Inventory Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --mango-yellow: #fcdb05;
            --mango-orange: #ff8c00;
            --mango-dark: #0f0c08; 
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 255, 255, 0.08);
            --mesh-color-1: rgba(252, 219, 5, 0.05);
            --mesh-color-2: rgba(252, 219, 5, 0.02);
            --logo-filter: brightness(0) invert(1);
            --sidebar-width: 240px;
            --modal-overlay: rgba(0,0,0,0.92);
            --modal-card: #14110e;
        }

        body.light-theme {
            --mango-dark: #f8f9fa; 
            --text-main: #1a1a1a;  
            --text-sub: #4a4a4a;   
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.1);
            --mesh-color-1: rgba(252, 219, 5, 0.15);
            --mesh-color-2: rgba(255, 140, 0, 0.05);
            --logo-filter: none;
            --modal-card: #ffffff;
            --modal-overlay: rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s, border 0.3s, transform 0.2s; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mango-dark);
            background-image: 
                radial-gradient(at 0% 0%, var(--mesh-color-1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, var(--mesh-color-2) 0px, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex; min-height: 100vh; overflow: hidden;
        }

        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }

       .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            z-index: 100;
        }

        .logo-section { padding: 40px 20px; text-align: center; }
        .logo-section img { width: 120px; filter: var(--logo-filter); }

        .nav-menu { flex: 1; padding: 10px 15px;overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 18px; margin-bottom: 6px;
            border-radius: 12px; color: var(--text-sub);
            text-decoration: none; font-weight: 500; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: var(--mango-yellow); color: #120f0a !important; font-weight: 700; box-shadow: 0 4px 15px rgba(252, 219, 5, 0.2); }

        .logout-btn {
            padding: 12px 18px; margin: 15px; border-radius: 12px;
            color: #ef4444; font-weight: 700; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem;
        }

        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        .header-card { padding: 25px 40px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--mango-yellow); color: #120f0a; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .report-card { padding: 20px; border-radius: 24px; display: flex; align-items: center; gap: 15px; }
        .report-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: var(--mango-yellow); color: #120f0a; }

        .filter-bar { display: flex; flex-wrap: wrap; justify-content: space-between; margin-bottom: 30px; gap: 20px; }
        .search-container { position: relative; flex: 1; max-width: 400px; }
        .search-container input { width: 100%; padding: 14px 20px 14px 45px; border-radius: 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .filter-select {
            min-width: 190px;
            padding: 14px;
            border-radius: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            outline: none;
        }

        .view-toggle { display: flex; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 4px; border-radius: 12px; }
        .view-toggle button { padding: 8px 16px; border-radius: 8px; color: var(--text-sub); }
        .view-toggle button.active { background: var(--mango-yellow); color: #000; font-weight: 700; }

        .inventory-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .inventory-grid.active { display: grid; }
        
        .inv-card { border-radius: 24px; padding: 25px; border: 1px solid var(--glass-border); background: var(--glass-bg); position: relative; overflow: hidden; }
        .inv-card:hover { transform: translateY(-8px); border-color: var(--mango-yellow); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .inv-card.inactive { opacity: 0.5; filter: grayscale(0.8); }
        
        .alert-ribbon { position: absolute; top: 12px; right: -30px; background: #ef4444; color: white; padding: 4px 35px; font-size: 0.65rem; font-weight: 900; transform: rotate(45deg); }

        .progress-bg { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; margin: 20px 0; }
        body.light-theme .progress-bg { background: rgba(0,0,0,0.05); }
        .progress-fill { height: 100%; border-radius: 10px; }

        .inv-table-container,
        .history-container {
            display: none;
            background: var(--glass-bg);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            overflow-x: auto;
        }

        .inv-table-container.active,
        .history-container.active { display: block; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 0.7rem; text-transform: uppercase; color: var(--mango-yellow); border-bottom: 1px solid var(--glass-border); }
        td { padding: 15px; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(15px); padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: var(--modal-card); width: 100%; max-width: 500px; padding: 35px; border-radius: 32px; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        .input-group label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--mango-orange); margin-bottom: 6px; letter-spacing: 1px; }
        .input-group input, .input-group select { width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: var(--text-main); outline: none; margin-bottom: 15px; }
        body.light-theme .input-group input, body.light-theme .input-group select { background: #f1f3f5; color: #000; border: 1px solid #dee2e6; }

        .btn-orange { background: var(--mango-orange); color: white; padding: 12px 25px; border-radius: 14px; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .btn-gray { background: rgba(255,255,255,0.05); color: var(--text-main); padding: 12px 25px; border-radius: 14px; font-weight: 700; font-size: 0.75rem; }
    </style>
</head>
<body class="dark-theme">

    <aside class="sidebar glass">
        <div class="logo-section"><img src="../images/logo.png" alt="Logo"></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-receipt"></i> Orders</a>
            <a href="accounts.html" class="nav-item"><i class="fa-solid fa-user-gear"></i> Accounts</a>
            <a href="wallet.html" class="nav-item"><i class="fa-solid fa-wallet"></i> Wallets</a>
            <a href="inventory.html" class="nav-item active"><i class="fa-solid fa-boxes-stacked"></i> Inventory</a>
            <a href="menuman.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Menu Manager</a>
            <a href="promo.html" class="nav-item"><i class="fa-solid fa-tags"></i> Promos</a>
            <a href="rewards.html" class="nav-item"><i class="fa-solid fa-gift"></i> Rewards</a>
            <a href="announce.html" class="nav-item"><i class="fa-solid fa-bell"></i> Announce</a>
            <a href="payments.html" class="nav-item"><i class="fa-solid fa-credit-card"></i> Payments</a>
            <a href="settings.html" class="nav-item"><i class="fa-solid fa-cog"></i> Settings</a>
        </nav>
        <a href="#" class="logout-btn" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
    </aside>

    <main class="main-content">
        <header class="header-card glass">
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter" style="color: var(--mango-yellow);">Inventory Hub</h1>
                <p class="text-xs font-mono opacity-60">Stock Monitoring & Logistics</p>
            </div>
            <button class="theme-toggle-circle" onclick="toggleTheme()">
                <i class="fa-solid fa-sun" id="themeIcon"></i>
            </button>
        </header>

        <section class="report-grid">
            <div class="report-card glass">
                <div class="report-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div><h3 class="text-[10px] uppercase font-bold opacity-50">Low Stock</h3><p id="lowStockCount" class="text-xl font-black">0</p></div>
            </div>
            <div class="report-card glass">
                <div class="report-icon"><i class="fas fa-box"></i></div>
                <div><h3 class="text-[10px] uppercase font-bold opacity-50">Total Supplies</h3><p id="totalItemsCount" class="text-xl font-black">0</p></div>
            </div>
        </section>

        <div class="filter-bar">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search supplies or categories..." onkeyup="renderItems()">
            </div>

            <select id="categoryFilter" class="filter-select" onchange="renderItems()">
                <option value="all">All Categories</option>
            </select>

            <select id="statusFilter" class="filter-select" onchange="renderItems()">
                <option value="all">All Status</option>
                <option value="active">Active Only</option>
                <option value="inactive">Inactive Only</option>
            </select>

            <div class="flex gap-4">
                <div class="view-toggle">
                    <button id="btnGrid" class="active" onclick="setView('grid')"><i class="fas fa-th-large"></i></button>
                    <button id="btnTable" onclick="setView('table')"><i class="fas fa-list"></i></button>
                    <button id="btnHistory" onclick="setView('history')"><i class="fas fa-clock-rotate-left"></i></button>
                </div>
                <button class="btn-orange shadow-lg hover:scale-105" onclick="openModal('addItemModal')">
                    <i class="fas fa-plus mr-2"></i> Register Supply
                </button>
            </div>
        </div>

        <div id="gridContent" class="inventory-grid active"></div>
        
        <div id="tableContent" class="inv-table-container">
            <table>
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Category</th>
                        <th>Level</th>
                        <th>Expiration</th>
                        <th>Status</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="historyContent" class="history-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Item</th>
                        <th>Change</th>
                        <th>Reason</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="addItemModal">
        <div class="modal-content glass">
            <button class="absolute top-6 right-8 text-2xl opacity-40" onclick="closeModal('addItemModal')">&times;</button>
            <h2 class="text-xl font-black uppercase text-yellow-400 mb-8">Register Supply</h2>
            <div class="input-group">
                <label>Item Name</label><input type="text" id="newItemName">
                <label>Category</label>
                <select id="newItemCategory">
                    <option value="Ingredients">Ingredients</option>
                    <option value="Packaging">Packaging</option>
                    <option value="Supplies">Supplies</option>
                    <option value="Add-ons">Add-ons</option>
                    <option value="Other">Other</option>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Initial Qty</label>
                        <input type="number" id="newItemQty" step="0.01" min="0">
                    </div>
                    <div>
                        <label>Unit</label>
                        <select id="newItemUnit">
                            <option value="kg">kg</option>
                            <option value="packs">packs</option>
                            <option value="liters">liters</option>
                            <option value="pcs">pcs</option>
                        </select>
                    </div>
                </div>
                <label>Expiration Date</label><input type="date" id="newItemExp">
                <label>Alert Threshold</label><input type="number" id="alertThreshold" step="0.01" min="0" value="10">
            </div>
            <div class="flex justify-between mt-8">
                <button class="btn-gray" onclick="closeModal('addItemModal')">Cancel</button>
                <button class="btn-orange" onclick="addNewItem()">Enable Tracking</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="adjustModal">
        <div class="modal-content glass">
            <button class="absolute top-6 right-8 text-2xl opacity-40" onclick="closeModal('adjustModal')">&times;</button>
            <h2 class="text-xl font-black uppercase text-yellow-400 mb-2">Adjust Stock</h2>
            <p id="adjustItemName" class="font-mono text-sm opacity-60 mb-8"></p>
            <div class="input-group">
                <label>Category</label>
                <select id="adjustCategoryInput">
                    <option value="Ingredients">Ingredients</option>
                    <option value="Packaging">Packaging</option>
                    <option value="Supplies">Supplies</option>
                    <option value="Add-ons">Add-ons</option>
                    <option value="Other">Other</option>
                </select>
                <label>New Quantity</label><input type="number" id="adjustQtyInput" step="0.01" min="0">
                <label>Update Expiration</label><input type="date" id="adjustExpInput">
                <label>Adjustment Note</label><input type="text" id="adjustReasonInput" placeholder="Reason for change...">
            </div>
            <div class="flex justify-between mt-8">
                <button class="btn-gray" onclick="closeModal('adjustModal')">Discard</button>
                <button class="btn-orange" id="confirmAdjust">Commit Update</button>
            </div>
        </div>
    </div>

    <script src="../js/authGuard.js"></script>
    <script src="../js/logout.js"></script>
    <script src="../js/inventory.js"></script>
</body>
</html>
