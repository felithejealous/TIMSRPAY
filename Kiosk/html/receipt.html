<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>
    <link rel="stylesheet" href="../css/receipt.css">
</head>
<body>

<div class="receipt">

    <!-- ORDER NUMBER -->
    <div class="receipt-order-number">
        <h1 id="orderNumber">----</h1>
    </div>

    <div class="receipt-header">
        <h2>TEO D' MANGO</h2>
        <p>Official Receipt</p>
        <p>Kiosk Order</p>
    </div>

    <div class="receipt-info">
        <!-- Added Order Type and Queue/Table Number display -->
        <div><span>Order Type</span><span id="orderType">Dine-in</span></div>
        <div id="queueNumberRow" style="display: none;"><span>Queue #</span><span id="queueNumber">--</span></div>
        <div id="tableNumberRow" style="display: none;"><span>Table #</span><span id="tableNumber">--</span></div>
        <div><span>Date</span><span id="orderDate">--/--/----</span></div>
        <div><span>Time</span><span id="orderTime">--:--</span></div>
        <div><span>Payment</span><span id="paymentMethod">Cash</span></div>
    </div>

    <!-- Made items dynamic -->
    <div class="receipt-items" id="receiptItems">
        <!-- Items will be loaded dynamically -->
    </div>

    <div class="receipt-totals">
        <div><span>Subtotal</span><span id="subtotalAmount">₱0.00</span></div>
        <div><span>Tax</span><span id="taxAmount">₱0.00</span></div>
        <div class="grand-total">
            <span>TOTAL</span>
            <span id="totalAmount">₱0.00</span>
        </div>
    </div>

    <div class="receipt-points">
        <div class="points-row">
            <span>Points Earned</span>
            <span class="points-highlight">+ <span id="earnedPoints">14</span> pts</span>
        </div>
    </div>

    <!-- Changed button text from "PRINT RECEIPT" to "CONFIRM ORDER" -->
    <!-- Added inline onclick handler to ensure button works -->
    <button class="receipt-btn" onclick="confirmOrder()">CONFIRM ORDER</button>

    <div class="receipt-footer">
        <p>Thank you for your purchase!</p>
        <p>Please keep this receipt.</p>
    </div>

</div>


<div id="printOverlay" class="print-overlay">
    <div class="print-content">
        <div class="spinner"></div>
        <!-- Changed overlay text from "Printing receipt..." to "Confirming order..." -->
        <p>Confirming order...</p>
    </div>
</div>

<!-- Enhanced receipt script to load from order data -->
<script src="../js/receipt.js"></script>

</body>
</html>
