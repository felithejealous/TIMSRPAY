<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango - Teo Pay MPIN</title>
    <link rel="stylesheet" href="../css/counter.css">
    <style>
        .pin-display {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(251, 188, 4, 0.2);
            border: 2px solid rgba(251, 188, 4, 0.5);
            transition: all 0.3s ease;
        }
        .pin-dot.filled {
            background: #FBBC04;
            border-color: #FBBC04;
            box-shadow: 0 0 10px rgba(251, 188, 4, 0.5);
        }
        .card-info {
            margin-top: 10px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>

    <div class="content-wrapper">
        <div class="glass-panel">
            <div class="input-section">
                <h1 class="minimal-title">Enter Your MPIN</h1>
                <div class="card-info" id="cardInfo">Card: ****-****-****-****</div>
                <div class="pin-display">
                    <div class="pin-dot" id="dot1"></div>
                    <div class="pin-dot" id="dot2"></div>
                    <div class="pin-dot" id="dot3"></div>
                    <div class="pin-dot" id="dot4"></div>
                    <div class="pin-dot" id="dot5"></div>
                    <div class="pin-dot" id="dot6"></div>
                </div>
            </div>

            <div class="numpad-grid">
                <button class="num-btn" onclick="addNum('1')">1</button>
                <button class="num-btn" onclick="addNum('2')">2</button>
                <button class="num-btn" onclick="addNum('3')">3</button>
                <button class="num-btn" onclick="addNum('4')">4</button>
                <button class="num-btn" onclick="addNum('5')">5</button>
                <button class="num-btn" onclick="addNum('6')">6</button>
                <button class="num-btn" onclick="addNum('7')">7</button>
                <button class="num-btn" onclick="addNum('8')">8</button>
                <button class="num-btn" onclick="addNum('9')">9</button>
                <button class="num-btn util" onclick="clearNum()">C</button>
                <button class="num-btn" onclick="addNum('0')">0</button>
                <button class="num-btn util" onclick="backspace()">⌫</button>
            </div>
        </div>

        <button class="minimal-footer-btn" id="confirmBtn">Confirm Payment</button>
    </div>

    <div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="width: 50px; height: 50px; border: 4px solid rgba(251, 188, 4, 0.3); border-top-color: #FBBC04; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: white; margin-top: 20px; font-size: 1.1em;">Verifying payment...</p>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        let inputString = "";
        const maxLength = 6;
        const confirmBtn = document.getElementById('confirmBtn');
        
        // Display masked card ID
        const cardId = localStorage.getItem('teopayCardId') || '000000000000';
        const maskedCardId = `****-****-****-${cardId.slice(-4)}`;
        document.getElementById('cardInfo').textContent = `Card: ${maskedCardId}`;

        function updateDisplay() {
            for (let i = 1; i <= 6; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i <= inputString.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            }
            confirmBtn.classList.toggle('active', inputString.length === maxLength);
        }

        function addNum(num) {
            if (inputString.length < maxLength) {
                inputString += num;
                updateDisplay();
            }
        }

        function clearNum() {
            inputString = "";
            updateDisplay();
        }

        function backspace() {
            inputString = inputString.slice(0, -1);
            updateDisplay();
        }

        confirmBtn.addEventListener('click', () => {
            if (inputString.length === maxLength) {
                // Show loading overlay
                document.getElementById('loadingOverlay').style.display = 'flex';
                
                // Load payment handler script
                const script = document.createElement('script');
                script.src = '../js/payment-handler.js';
                script.onload = () => {
                    // Simulate payment verification
                    setTimeout(() => {
                        const order = window.createOrderFromCart();
                        if (order) {
                            // Generate random queue number between 1-99
                            const queueNumber = Math.floor(Math.random() * 99) + 1;
                            
                            order.paymentMethod = 'Teo Pay';
                            order.queueNumber = queueNumber;
                            order.orderType = localStorage.getItem('orderType') || 'Dine-in';
                            order.teopayCardId = maskedCardId;
                            
                            localStorage.setItem('currentOrder', JSON.stringify(order));
                            window.location.href = '../html/receipt.html';
                        }
                    }, 2000);
                };
                document.head.appendChild(script);
            } else {
                alert('Please enter complete 6-digit MPIN');
            }
        });

        updateDisplay();
    </script>
</body>
</html>
