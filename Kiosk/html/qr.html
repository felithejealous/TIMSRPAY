<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango - QR Payment</title>
    <link rel="stylesheet" href="../css/qr.css">
</head>
<body>

    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>

    <div class="content-wrapper">
        <div class="glass-panel">
            <div class="qr-section">
                <h1 class="minimal-title">Scan to Pay</h1>
                
                <div class="qr-frame">
                    <div class="qr-placeholder">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="5" y="5" width="90" height="90" rx="4" stroke="currentColor" stroke-width="2"/>
                            <rect x="15" y="15" width="20" height="20" rx="2" stroke="currentColor" stroke-width="4"/>
                            <rect x="65" y="15" width="20" height="20" rx="2" stroke="currentColor" stroke-width="4"/>
                            <rect x="15" y="65" width="20" height="20" rx="2" stroke="currentColor" stroke-width="4"/>
                            <rect x="22" y="22" width="6" height="6" rx="1" fill="currentColor"/>
                            <rect x="72" y="22" width="6" height="6" rx="1" fill="currentColor"/>
                            <rect x="22" y="72" width="6" height="6" rx="1" fill="currentColor"/>
                            <rect x="45" y="15" width="10" height="10" rx="1" fill="#ddd"/>
                            <rect x="65" y="45" width="10" height="10" rx="1" fill="#ddd"/>
                            <rect x="45" y="65" width="10" height="10" rx="1" fill="currentColor"/>
                            <rect x="45" y="40" width="10" height="10" rx="1" fill="currentColor"/>
                        </svg>
                    </div>
                </div>

                <div class="payment-info">
                    <p class="status-text">Total Amount</p>
                    <h2 class="payment-amount">₱60.00</h2>
                </div>
            </div>
        </div>
    </div>

    <div id="paymentOverlay" class="payment-done-overlay">
        <div class="done-content">
            <div class="checkmark-wrapper">
                <svg class="checkmark-svg" viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h2>Payment Done</h2>
            <p>Redirecting to order number...</p>
        </div>
    </div>

    <script>
        // Simulate payment processing
        setTimeout(() => {
            const overlay = document.getElementById('paymentOverlay');
            overlay.classList.add('show');

            // Redirect to counter.html after 2.5 seconds
            setTimeout(() => {
                window.location.href = '../html/counter.html';
            }, 2500);
        }, 4000); 
    </script>
</body>
</html>
