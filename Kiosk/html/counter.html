<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teo D' Mango - Order Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --mango-deep: #ff8c00;
            --mango-bright: #ffb703;
            --text-dark: #2d1e18;
            --glass-base: rgba(255, 255, 255, 0.45); 
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-blur: blur(25px);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%; width: 100%; overflow: hidden;
            background: linear-gradient(-45deg, #ffb703, #ff8c00, #fffdf5, #ffd000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .back-btn {
            position: fixed; top: 1.5rem; left: 1.5rem;
            background: var(--glass-base);
            border: 2px solid var(--glass-border);
            width: 3.5rem; height: 3.5rem; border-radius: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            cursor: pointer; color: var(--text-dark); z-index: 100;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        .content-wrapper {
            display: flex; flex-direction: column; align-items: center;
            gap: 1.5rem; z-index: 10; width: 90%; max-width: 450px;
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body.keyboard-open .content-wrapper {
            transform: translate(-50%, -85%); 
        }

        .glass-panel {
            background: var(--glass-base);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 3.5rem 2rem;
            border-radius: 45px;
            border: 2px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex; flex-direction: column; align-items: center;
            gap: 1.2rem; width: 100%; text-align: center;
        }

        .minimal-title {
            font-size: 1.8rem; font-weight: 800;
            color: var(--text-dark); text-transform: uppercase; letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem; color: #5d4037;
            margin-top: -0.8rem; font-weight: 600;
        }

        .name-input {
            width: 100%; padding: 22px; border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.5);
            font-size: 1.8rem; text-align: center; font-weight: 800;
            color: var(--text-dark); outline: none;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* KEYBOARD STYLING */
        .keyboard-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 15px 10px 30px;
            display: none; flex-direction: column;
            gap: 10px; z-index: 1500;
            border-top: 2px solid rgba(255,255,255,0.5);
            animation: slideUp 0.4s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .keyboard-container.show { display: flex; }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .kb-row { display: flex; justify-content: center; gap: 8px; width: 100%; max-width: 900px; margin: 0 auto; }
        
        .key {
            background: rgba(255, 255, 255, 0.7);
            color: var(--text-dark); flex: 1; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 800; font-size: 1.3rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
            cursor: pointer; user-select: none;
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.2s ease;
        }

        .key:active { background: white; transform: translateY(2px); box-shadow: none; }
        .key.space { flex: 4; font-size: 0.9rem; letter-spacing: 3px; }

        .key.done { 
            flex: 2; 
            background: var(--text-dark); 
            color: white; 
            font-size: 0.9rem;
            opacity: 0.3;
            pointer-events: none;
        }

        .key.done.ready {
            opacity: 1;
            pointer-events: auto;
            background: #000;
        }

        #successOverlay {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(25px);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 3000;
        }

        #successOverlay.active { display: flex; }

        .spinner {
            width: 80px; height: 80px;
            border: 8px solid rgba(0,0,0,0.05);
            border-top: 8px solid var(--mango-deep);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 2rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>

    <div class="content-wrapper" id="contentWrapper">
        <div class="glass-panel">
            <h1 class="minimal-title">Customer Name</h1>
            <p class="subtitle">Enter name to finalize your order</p>
            <input type="text" class="name-input" id="customerName" placeholder="TAP TO TYPE" readonly>
        </div>
    </div>

    <div id="successOverlay">
        <div class="spinner"></div>
        <h2 style="font-size: 1.8rem; font-weight: 900; color: var(--text-dark); text-transform: uppercase; letter-spacing: 2px;">GENERATING RECEIPT</h2>
        <p style="font-size: 1.1rem; color: #5d4037; font-weight: 600; margin-top: 0.5rem;">Please wait while we prepare your order...</p>
    </div>

    <div class="keyboard-container" id="keyboard">
        <div class="kb-row">
            <div class="key" onclick="type('Q')">Q</div><div class="key" onclick="type('W')">W</div><div class="key" onclick="type('E')">E</div><div class="key" onclick="type('R')">R</div><div class="key" onclick="type('T')">T</div><div class="key" onclick="type('Y')">Y</div><div class="key" onclick="type('U')">U</div><div class="key" onclick="type('I')">I</div><div class="key" onclick="type('O')">O</div><div class="key" onclick="type('P')">P</div>
        </div>
        <div class="kb-row">
            <div class="key" onclick="type('A')">A</div><div class="key" onclick="type('S')">S</div><div class="key" onclick="type('D')">D</div><div class="key" onclick="type('F')">F</div><div class="key" onclick="type('G')">G</div><div class="key" onclick="type('H')">H</div><div class="key" onclick="type('J')">J</div><div class="key" onclick="type('K')">K</div><div class="key" onclick="type('L')">L</div>
        </div>
        <div class="kb-row">
            <div class="key" onclick="type('Z')">Z</div><div class="key" onclick="type('X')">X</div><div class="key" onclick="type('C')">C</div><div class="key" onclick="type('V')">V</div><div class="key" onclick="type('B')">B</div><div class="key" onclick="type('N')">N</div><div class="key" onclick="type('M')">M</div><div class="key" style="flex: 1.5" onclick="del()">⌫</div>
        </div>
        <div class="kb-row">
            <div class="key space" onclick="type(' ')">SPACE</div>
            <div class="key done" id="doneBtn" onclick="processOrder()">CONFIRM</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('customerName');
        const kb = document.getElementById('keyboard');
        const doneBtn = document.getElementById('doneBtn');
        const overlay = document.getElementById('successOverlay');

        function updateBtnState() {
            if (input.value.trim().length >= 2) {
                doneBtn.classList.add('ready');
            } else {
                doneBtn.classList.remove('ready');
            }
        }

        input.addEventListener('click', (e) => {
            e.stopPropagation();
            kb.classList.add('show');
            document.body.classList.add('keyboard-open');
        });

        function type(c) { 
            input.value += c; 
            updateBtnState();
        }

        function del() { 
            input.value = input.value.slice(0, -1); 
            updateBtnState();
        }

        function processOrder() {
            const finalName = input.value.trim();
            
            // Backend Integration point:
            // Send 'finalName' to your API via fetch/POST
            // console.log("Processing order for:", finalName);

            kb.classList.remove('show');
            document.body.classList.remove('keyboard-open');
            overlay.classList.add('active');
            
            // Simulating API processing time
            setTimeout(() => {
                window.location.href = 'receipt.html';
            }, 3500);
        }

        document.addEventListener('click', (e) => {
            if (!kb.contains(e.target) && e.target !== input) {
                kb.classList.remove('show');
                document.body.classList.remove('keyboard-open');
            }
        });
    </script>
</body>
</html>
