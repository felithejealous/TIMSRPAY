<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango - Kiosk Menu</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica', Arial, sans-serif;
        }
        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: #f9f9f9;
        }

        header {
            position: relative; 
            background-image: url(../Images/Teo-banner.png);
            height: 18rem; /* Increased height for banner */
            padding: 1rem;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .legend-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .choose {
            position: absolute;
            bottom: -2rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 1.8rem; /* Slightly larger text */
            font-weight: bold;
            padding: 0.8rem;
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 60%;
            z-index: 10;
        }

        .main-content {
            padding-top: 3rem;
            /* Changed min-height to ensure content can fill screen without fixed padding */
            min-height: calc(100vh - 18rem); 
        }

        /* --- UPDATED PRODUCT GRID STYLING --- */
        .product-grid {
            margin: 2rem;
            display: grid;
            /* 3 items at a time on tablets, auto-adjusts based on screen width */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px;
            /* Removed fixed padding-bottom, will manage with JS */
            padding-bottom: 2rem;
        }

        /* Class added by JS when cart has items */
        .product-grid.has-cart {
            padding-bottom: 150px; /* Space for floating bar */
        }

        .product-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
        }

        .img-wrapper {
            width: 100%;
            height: 250px; /* Increased height to make pictures longer */
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 15px;
            background-color: #f5f5f5;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        .product-info h3 { 
            font-size: 1.3rem; 
            margin-bottom: 8px; 
            color: #222; 
            font-weight: 800;
        }

        .product-info p { 
            font-size: 0.95rem; 
            color: #666; 
            margin-bottom: 15px; 
            line-height: 1.5;
            height: 3em; /* Slightly more room for description */
            overflow: hidden; 
        }

        .product-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            margin-top: auto;
        }

        .price-tag { 
            font-weight: 900; 
            font-size: 1.2rem; 
            color: #222;
        }

        .add-btn-small {
            background: #FBBC04;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        /* --- FLOATING ORDER BAR --- */
        .floating-cart-bar {
            position: fixed;
            bottom: 20px;         
            left: 50%;
            transform: translateX(-50%);
            width: 90%;            
            max-width: 800px;   
            height: 5rem; 
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 50px; 
            padding: 0 2rem;    
            z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
            border: none;
            transition: all 0.3s ease;
        }

        .cart-total { font-weight: 900; font-size: 1.5rem; color: #333; }

        .button-group { display: flex; gap: 10px; align-items: center; }

        .btn {
            height: 3rem; 
            min-width: 160px;
            padding: 0 25px;
            border-radius: 50px;  
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem; 
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-outline { border: 1.5px solid #FBBC04 !important; background: transparent; color: #444; }
        .btn-fill { background: #FBBC04; color: white; box-shadow: 0 3px 10px rgba(251, 188, 4, 0.25); }

        /* Order Popup Styling (Untouched) */
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 10000; display: none; backdrop-filter: blur(6px);
        }

        .cart-popup {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; background: #fff; height: 85vh;            
            border-radius: 40px 40px 0 0; transition: bottom 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 10001; box-shadow: 0 -15px 50px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        .cart-popup.active { bottom: 0; }

        .cart-header { padding: 25px 30px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .cart-title { font-size: 1.6rem; font-weight: 900; color: #222; }

        .cart-items { flex: 1; overflow-y: auto; padding: 20px 30px; background: #fdfdfd; }

        .cart-item {
            background: #fff; 
            display: flex; 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 15px; 
            align-items: center; 
            gap: 18px; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.06); 
            border: 1px solid #e2e2e2;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .cart-item:hover {
            border-color: #FBBC04;
            transform: translateY(-2px);
        }

        .cart-item-img-container { 
            width: 85px; 
            height: 85px; 
            border-radius: 12px; 
            overflow: hidden; 
            flex-shrink: 0;
            border: 1px solid #f0f0f0;
        }
        .cart-item-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .cart-item-details { flex: 1; }
        .cart-item-details h4 { font-size: 1.1rem; color: #222; font-weight: 800; }
        .item-meta { font-size: 0.75rem; color: #666; margin-top: 4px; font-weight: 500; }

        .qty-controller {
            display: inline-flex;
            align-items: center;
            background: #f1f1f1;
            padding: 4px;
            border-radius: 14px;
            margin-top: 10px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            background: #FBBC04;
            color: white;
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .qty-number-box {
            width: 45px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #333;
            font-size: 1.1rem;
            background: white;
            margin: 0 4px;
            border-radius: 8px;
        }

        .cart-item-price { font-size: 1.3rem; font-weight: 900; color: #FBBC04; min-width: 90px; text-align: right; }

        .bottom-pop { padding: 25px 30px; background: white; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .cart-total-text { display: flex; flex-direction: column; }
        .cart-total-text .label { font-size: 0.85rem; color: #999; text-transform: uppercase; font-weight: bold; }
        .cart-total-text .amount { font-size: 2rem; font-weight: 900; color: #222; }

        /* Media Queries for Tablet/Kiosk */
        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr); /* 3 items per row on tablets */
            }
        }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: 1fr; margin: 2rem 1.5rem; }
            .btn { min-width: 120px; font-size: 0.7rem; }
            .cart-popup { height: 90vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="legend-container">
            <div class="choose">PICK YOUR ORDER</div>
        </div>
    </header>

    <div class="main-content">
        <div class="product-grid" id="productGrid">
            </div>
    </div>

    <div class="floating-cart-bar" id="floatingBar" style="display:none;">
        <div class="cart-total" id="barTotal">₱ 0.00</div>
        <div class="button-group">
            <button class="btn btn-fill" onclick="toggleCart()">VIEW MY ORDERS</button>
        </div>
    </div>

    <div class="cart-overlay" id="overlay" onclick="toggleCart()"></div>

    <div class="cart-popup" id="cartPanel">
        <div class="cart-header">
            <div class="cart-title">YOUR ORDERS</div>
            <button class="btn" style="background: #f8f8f8; border-radius: 50%; width: 45px; height: 45px; min-width: 45px; padding: 0; font-size: 1.3rem;" onclick="toggleCart()">✕</button>
        </div>
        
        <div id="cartItemsContainer" class="cart-items">
            <div style="text-align:center; padding-top:50px; color:#aaa;">No orders yet</div>
        </div>

        <div class="bottom-pop">
            <div class="cart-total-text">
                <span class="label">Total Amount</span>
                <span class="amount" id="popupTotal">₱ 0.00</span>
            </div>
            <div class="button-group">
                <button class="btn btn-outline" onclick="toggleCart()">ADD MORE</button>
                <button class="btn btn-fill" id="placeOrderFinal" onclick="goToCheckout()">PLACE ORDER</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Classic Teo D' Mango", price: 60, desc: "Tropical mango slush blended with premium ice cream and toasted graham.", img: "../Images/mangga.png" },
            { id: 2, name: "Strawberry", price: 60, desc: "Wild berry cake slush with fresh strawberry bits and cream.", img: "../Images/strawberry.png" },
            { id: 3, name: "Ube", price: 60, desc: "Rich purple yam blend with farm-fresh milk and swirls.", img: "../Images/ube.png" },
            { id: 4, name: "Avocado", price: 60, desc: "Tropical Avocado blend with premium vanilla and graham.", img: "../Images/avocado.png" },
            { id: 5, name: "Buko", price: 60, desc: "Refreshing coconut base with chewy tapioca pearls.", img: "../Images/Buko.png" },
            { id: 6, name: "Lychee", price: 60, desc: "Sweet lychee blend with fresh fruit bits and syrup.", img: "../Images/lychee.png" }
        ];

        let tray = JSON.parse(localStorage.getItem('teo_tray')) || [];
        const grid = document.getElementById('productGrid');
        
        function renderProducts() {
            grid.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => {
                    window.location.href = `customize.html?id=${p.id}`;
                };

                card.innerHTML = `
                    <div class="img-wrapper">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <div class="product-controls">
                            <div class="price-tag">₱${p.price.toFixed(2)}</div>
                            <button class="add-btn-small">Select</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.onload = () => {
            renderProducts();
            renderTray();
        };

        function saveTray() {
            localStorage.setItem('teo_tray', JSON.stringify(tray));
        }

        function updateQty(index, delta, event) {
            if (event) event.stopPropagation();
            tray[index].qty += delta;
            if (tray[index].qty <= 0) tray.splice(index, 1);
            saveTray();
            renderTray();
        }

        function editItem(index) {
            const item = tray[index];
            window.location.href = `customize.html?id=${item.id}&editIndex=${index}`;
        }

        function renderTray() {
            const container = document.getElementById('cartItemsContainer');
            const floatingBar = document.getElementById('floatingBar');
            const productGrid = document.getElementById('productGrid');

            if (tray.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding-top:50px; color:#aaa;">No orders yet</div>`;
                updateTotals(0);
                floatingBar.style.display = 'none';
                productGrid.classList.remove('has-cart'); // Remove space
                return;
            } else {
                floatingBar.style.display = 'flex';
                productGrid.classList.add('has-cart'); // Add space
            }

            container.innerHTML = '';
            let total = 0;
            tray.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.onclick = () => editItem(index);
                
                const addons = [item.size, item.sugarLevel, ...(item.toppings || [])].filter(Boolean).join(', ');

                itemEl.innerHTML = `
                    <div class="cart-item-img-container"><img src="${item.img}" alt="${item.name}"></div>
                    <div class="cart-item-details">
                        <h4>${item.name}</h4>
                        <div class="item-meta">${addons}</div>
                        <div class="qty-controller">
                            <button class="qty-btn" onclick="updateQty(${index}, -1, event)">-</button>
                            <div class="qty-number-box">${item.qty}</div>
                            <button class="qty-btn" onclick="updateQty(${index}, 1, event)">+</button>
                        </div>
                    </div>
                    <div class="cart-item-price">₱${itemTotal.toFixed(2)}</div>
                `;
                container.appendChild(itemEl);
            });
            updateTotals(total);
        }

        function updateTotals(total) {
            const formatted = `₱ ${total.toFixed(2)}`;
            document.getElementById('barTotal').innerText = formatted;
            document.getElementById('popupTotal').innerText = formatted;
        }

        function toggleCart() {
            const panel = document.getElementById('cartPanel');
            const overlay = document.getElementById('overlay');
            const isActive = panel.classList.toggle('active');
            overlay.style.display = isActive ? 'block' : 'none';
        }

        function goToCheckout() {
            if (tray.length === 0) return;
            saveTray();
            window.location.href = "payment-options.html";
        }
    </script>
</body>
</html>
