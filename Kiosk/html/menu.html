<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teo D' Mango - Order Type</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica', Arial, sans-serif;
        }
        ::-webkit-scrollbar {
            display: none;
        }

        header {
            position: relative; 
            background-image: url(../Images/teoDMangoBG-horizontal.png);
            height: 15rem;
            padding: .5rem;
            background-position: top;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .legend-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .choose {
            position: absolute;
            bottom: -1.5rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            padding: .5rem;
            background-color: white;
            border-radius: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 70%;
            z-index: 10;
        }

        .main-content {
            padding-top: 2rem;
            background-color: #f9f9f9;
            min-height: calc(100vh - 15rem);
        }

        .product-grid {
            margin: 2.5rem 2rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-bottom: 120px; 
        }

        .product-card {
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            aspect-ratio: 2/3.5;
            color: white;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s;
        }

        .product-card:hover { transform: scale(1.02); }

        .product-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
        }

        .product-info h3 { font-size: 0.9rem; margin-bottom: 2px; }
        .product-info p { font-size: 0.7rem; opacity: 0.8; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .price-tag { font-weight: bold; font-size: 1rem; }

        /* --- FLOATING ORDER BAR --- */
        .floating-cart-bar {
            position: fixed;
            bottom: 20px;         
            left: 50%;
            transform: translateX(-50%);
            width: 90%;             
            max-width: 650px;    
            height: 4.5rem; 
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 50px; 
            padding: 0 1.5rem;    
            z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
            border: none;
            transition: all 0.3s ease;
        }

        .cart-total { font-weight: 900; font-size: 1.2rem; color: #333; }

        .button-group { display: flex; gap: 10px; align-items: center; }

        .btn {
            height: 2.6rem; 
            min-width: 120px; 
            border-radius: 50px;  
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem; 
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-outline { border: 1.5px solid #FBBC04 !important; background: transparent; color: #444; }
        .btn-fill { background: #FBBC04; color: white; box-shadow: 0 3px 10px rgba(251, 188, 4, 0.25); }

        /* Order Popup */
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 10000; display: none; backdrop-filter: blur(6px);
        }

        .cart-popup {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; background: #fff; height: 85vh;             
            border-radius: 40px 40px 0 0; transition: bottom 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 10001; box-shadow: 0 -15px 50px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        .cart-popup.active { bottom: 0; }

        .cart-header { padding: 25px 30px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .cart-title { font-size: 1.6rem; font-weight: 900; color: #222; }

        .cart-items { flex: 1; overflow-y: auto; padding: 20px 30px; background: #fdfdfd; }

        .cart-item {
            background: #fff; 
            display: flex; 
            border-radius: 20px; 
            padding: 18px; 
            margin-bottom: 15px; 
            align-items: center; 
            gap: 18px; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.06); 
            border: 1px solid #e2e2e2;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .cart-item:hover {
            border-color: #FBBC04;
            transform: translateY(-2px);
        }

        .cart-item-img-container { 
            width: 85px; 
            height: 85px; 
            border-radius: 12px; 
            overflow: hidden; 
            flex-shrink: 0;
            border: 1px solid #f0f0f0;
        }
        .cart-item-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .cart-item-details { flex: 1; }
        .cart-item-details h4 { font-size: 1.1rem; color: #222; font-weight: 800; }
        .item-meta { font-size: 0.75rem; color: #666; margin-top: 4px; font-weight: 500; }

        .qty-controller {
            display: inline-flex;
            align-items: center;
            background: #f1f1f1;
            padding: 4px;
            border-radius: 14px;
            margin-top: 10px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            background: #FBBC04;
            color: white;
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .qty-number-box {
            width: 45px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #333;
            font-size: 1.1rem;
            background: white;
            margin: 0 4px;
            border-radius: 8px;
        }

        .cart-item-price { font-size: 1.3rem; font-weight: 900; color: #FBBC04; min-width: 90px; text-align: right; }

        .bottom-pop { padding: 25px 30px; background: white; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .cart-total-text { display: flex; flex-direction: column; }
        .cart-total-text .label { font-size: 0.85rem; color: #999; text-transform: uppercase; font-weight: bold; }
        .cart-total-text .amount { font-size: 2rem; font-weight: 900; color: #222; }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); margin: 2rem 1rem; }
            .btn { min-width: 100px; font-size: 0.65rem; }
            .cart-popup { height: 90vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="legend-container">
            <div class="choose">PICK YOUR ORDER</div>
        </div>
    </header>

    <div class="main-content">
        <div class="product-grid" id="productGrid">
            <!-- Product cards -->
        </div>
    </div>

    <!-- Floating Order Bar -->
    <div class="floating-cart-bar" id="floatingBar">
        <div class="cart-total" id="barTotal">₱ 0.00</div>
        <div class="button-group">
            <button class="btn btn-fill" onclick="toggleCart()">VIEW MY ORDERS</button>
        </div>
    </div>

    <div class="cart-overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- Order Popup -->
    <div class="cart-popup" id="cartPanel">
        <div class="cart-header">
            <div class="cart-title">YOUR ORDERS</div>
            <button class="btn" style="background: #f8f8f8; border-radius: 50%; width: 45px; height: 45px; min-width: 45px; padding: 0; font-size: 1.3rem;" onclick="toggleCart()">✕</button>
        </div>
        
        <div id="cartItemsContainer" class="cart-items">
            <div style="text-align:center; padding-top:50px; color:#aaa;">No orders yet</div>
        </div>

        <div class="bottom-pop">
            <div class="cart-total-text">
                <span class="label">Total Amount</span>
                <span class="amount" id="popupTotal">₱ 0.00</span>
            </div>
            <div class="button-group">
                <button class="btn btn-outline" onclick="toggleCart()">ADD MORE</button>
                <button class="btn btn-fill" id="placeOrderFinal" onclick="goToCheckout()">PLACE ORDER</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Classic Teo D' Mango", price: 60, desc: "Tropical mango slush...", img: "../Images/mangga.png", color: "#e67e22" },
            { id: 2, name: "Strawberry", price: 60, desc: "Fruity blend...", img: "../Images/strawberry.png", color: "#e91e63" },
            { id: 3, name: "Ube", price: 60, desc: "Purple yam...", img: "../Images/ube.png", color: "#9c27b0" },
            { id: 4, name: "Avocado", price: 60, desc: "Tropical Avocado...", img: "../Images/avocado.png", color: "#68ee51" },
            { id: 5, name: "Buko", price: 60, desc: "Coconut base...", img: "../Images/Buko.png", color: "#1edfe9" },
            { id: 6, name: "Lychee", price: 60, desc: "Lychee blend...", img: "../Images/lychee.png", color: "#f4a7cf" }
        ];

        // --- REFRESH LOGIC ---
        // If a URL parameter 'orderSuccess=true' is passed, we clear the tray immediately.
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('orderSuccess') === 'true') {
            localStorage.removeItem('teo_tray');
        }

        // Persistent Order Logic
        let tray = JSON.parse(localStorage.getItem('teo_tray')) || [];

        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.style.backgroundImage = `url('${p.img}')`;
            card.style.backgroundColor = p.color;
            
            card.onclick = () => {
                window.location.href = `customize.html?id=${p.id}`;
            };

            card.innerHTML = `
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                    <div class="price-tag">₱${p.price.toFixed(2)}</div>
                </div>
            `;
            grid.appendChild(card);
        });

        // Initialize display
        window.onload = () => {
            renderTray();
        };

        function saveTray() {
            localStorage.setItem('teo_tray', JSON.stringify(tray));
        }

        function updateQty(index, delta, event) {
            if (event) event.stopPropagation();
            
            tray[index].qty += delta;
            if (tray[index].qty <= 0) {
                tray.splice(index, 1);
            }
            saveTray();
            renderTray();
        }

        function editItem(index) {
            const item = tray[index];
            window.location.href = `customize.html?id=${item.id}&editIndex=${index}`;
        }

        function renderTray() {
            const container = document.getElementById('cartItemsContainer');
            if (tray.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding-top:50px; color:#aaa;">No orders yet</div>`;
                updateTotals(0);
                document.getElementById('floatingBar').style.display = 'none';
                return;
            } else {
                document.getElementById('floatingBar').style.display = 'flex';
            }

            container.innerHTML = '';
            let total = 0;
            tray.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.onclick = () => editItem(index);
                
                const addons = [item.size, item.sugarLevel, ...(item.toppings || [])].filter(Boolean).join(', ');

                itemEl.innerHTML = `
                    <div class="cart-item-img-container"><img src="${item.img}" alt="${item.name}"></div>
                    <div class="cart-item-details">
                        <h4>${item.name}</h4>
                        <div class="item-meta">${addons}</div>
                        <div class="qty-controller">
                            <button class="qty-btn" onclick="updateQty(${index}, -1, event)">-</button>
                            <div class="qty-number-box">${item.qty}</div>
                            <button class="qty-btn" onclick="updateQty(${index}, 1, event)">+</button>
                        </div>
                    </div>
                    <div class="cart-item-price">₱${itemTotal.toFixed(2)}</div>
                `;
                container.appendChild(itemEl);
            });
            updateTotals(total);
        }

        function updateTotals(total) {
            const formatted = `₱ ${total.toFixed(2)}`;
            document.getElementById('barTotal').innerText = formatted;
            document.getElementById('popupTotal').innerText = formatted;
        }

        function toggleCart() {
            const panel = document.getElementById('cartPanel');
            const overlay = document.getElementById('overlay');
            const isActive = panel.classList.toggle('active');
            overlay.style.display = isActive ? 'block' : 'none';
        }

        function goToCheckout() {
            if (tray.length === 0) {
                return;
            }
            // Save state one last time before moving
            saveTray();
            window.location.href = "payment-options.html";
        }
    </script>
</body>
</html>
