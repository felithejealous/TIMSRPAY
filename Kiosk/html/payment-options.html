<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teo D' Mango - Order Type</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --mango-deep: #ff8c00;
            --mango-bright: #ffb703;
            --text-dark: #2d1e18;
            --glass-base: rgba(255, 255, 255, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-blur: blur(25px);
        }

        /* Animated Mesh Background */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            min-height: 100vh; width: 100vw; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(-45deg, #ffb703, #ff8c00, #fffdf5, #ffd000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        /* --- REFINED MINIMALIST BACK BUTTON --- */
        .back-btn {
            position: fixed; 
            top: 1.5rem; 
            left: 1.5rem;
            background: var(--glass-base); 
            border: 1.5px solid var(--glass-border);
            width: 3rem; 
            height: 3rem; 
            border-radius: 1rem;
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 100; 
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-dark);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .back-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.6);
        }

        .container {
            width: 90%;
            max-width: 850px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 50px;
        }

        .order-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 60px;
            width: 100%;
        }

        /* --- OPTION CARDS --- */
        .option-card {
            background: var(--glass-base);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 2px solid var(--glass-border);
            border-radius: 45px;
            width: 300px; 
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            color: var(--text-dark);
        }

        .option-card:active { transform: scale(0.96); }

        .option-card.selected {
            background: rgba(255,255,255,0.8);
            border-color: var(--mango-bright);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255, 183, 3, 0.2);
        }

        .icon-box {
            width: 120px;
            height: 120px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px;
            border-radius: 20px;
        }

        .icon-box svg { 
            width: 80px; 
            color: var(--mango-deep); 
        }

        .icon-box img.teo-pay-img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .option-label {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        /* --- NEXT BUTTON --- */
        .footer-btn {
            background: var(--text-dark);
            color: white;
            border: none;
            padding: 22px 60px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0.5;
            pointer-events: none;
        }

        .footer-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .footer-btn:active { transform: scale(0.98); }

        /* TOAST MESSAGE */
        .toast {
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 30px; 
            z-index: 9999; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 0.8rem;
            animation: fadeInOut 2.5s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

    </style>
</head>
<body>

    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </button>

    <div class="container">
        <h1>Select payment mode</h1>

        <div class="order-options">
            <button class="option-card" data-target="../html/counter.html">
                <div class="icon-box">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 90V75C10 68 15 64 22 64H78C85 64 90 68 90 75V90" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
                        <path d="M68 64V52" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
                        <rect x="42" y="15" width="46" height="37" rx="8" stroke="currentColor" stroke-width="8"/>
                    </svg>
                </div>
                <span class="option-label">Pay at the counter</span>
            </button>

            <button class="option-card" data-target="../html/teopaycardid.html">
                <div class="icon-box">
                    <img src="../Images/mango-icon.png" alt="Teo Pay" class="teo-pay-img">
                </div>
                <span class="option-label">TeoPay</span>
            </button>
        </div>

        <button class="footer-btn" id="nextBtn">Next</button>
    </div>
    <script src="../js/kiosk-payment-option.js"></script>
</body>
</html>
